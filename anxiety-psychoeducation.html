var ANX_PE_GROUPS=[
  {label:null,optional:false,items:[
    {id:'anx_system',title:'The anxiety system: what it is doing and why',body:'<p><strong>Anxiety is not a malfunction.</strong> It is a threat-detection and response system that evolved over millions of years because organisms that detected danger quickly and responded powerfully were more likely to survive. The core structures are the amygdala (a rapid threat-detection centre that operates below conscious awareness) and the hypothalamic-pituitary-adrenal (HPA) axis, which coordinates the hormonal stress response. Together, these produce the experience of anxiety and the physiological changes that prepare the body for action.</p> <p><strong>What happens in the body during anxiety:</strong></p> <ul> <li><strong>Heart rate increases:</strong> Pumping blood to muscles faster, preparing for movement. This feels like a racing or pounding heart.</li> <li><strong>Breathing changes:</strong> Breathing becomes faster and shallower to increase oxygen intake. This can cause tingling in the hands and feet, lightheadedness, and derealization - all from changes in CO2 levels. None of this is dangerous.</li> <li><strong>Muscle tension:</strong> Muscles prime for action, particularly in the shoulders, jaw, and legs. Chronic low-level activation causes the aching and fatigue many anxious people feel.</li> <li><strong>Blood is redirected:</strong> Away from digestion (causing nausea and the sensation of butterflies) and toward large muscles.</li> <li><strong>Derealization and depersonalization:</strong> The brain shifts from reflective to reactive processing. The world can feel unreal, or you can feel detached from yourself. This is a normal feature of high arousal - not a sign of psychosis, brain disease, or losing your mind.</li> <li><strong>Sweating:</strong> Cools the body in anticipation of exertion.</li> </ul> <p><strong>The false alarm problem:</strong> The amygdala does not distinguish well between a tiger and a difficult conversation, between physical danger and social rejection, or between a real threat and an imagined one. It responds to perceived threat. The same physiological activation that would help you escape a predator fires when you are about to give a presentation, when you check your health symptoms online, or when you face uncertainty about the future. The alarm system is functioning correctly - it is simply calibrated to a threat level that is disproportionate to the actual danger.</p> <p><strong>The ironic process:</strong> Trying to suppress anxiety amplifies it. Psychologist Daniel Wegner\'s research on ironic processes demonstrated that actively trying NOT to think about something reliably increases the frequency of that thought. The same applies to anxiety: monitoring yourself for anxiety symptoms, trying to prevent anxiety from starting, or mentally fighting it when it occurs all sustain and amplify the response. This is why "just calm down" is not only unhelpful but counterproductive.</p> <p><strong>The goal is not zero anxiety.</strong> Anxiety is adaptive in the right doses - it sharpens attention, improves performance on familiar tasks, and motivates protective behaviour. A person with no anxiety would not look before crossing the road. The clinical goal is anxiety that is <strong>proportionate to actual threat</strong> and that does not interfere with the person living their life according to their values.</p>'},
    {id:'anx_avoidance',title:'The avoidance trap: how anxiety maintains itself',body:'<p><strong>Avoidance is the engine that keeps anxiety running.</strong> When anxiety is high and a person avoids the feared situation, their anxiety drops immediately. This relief is real, powerful, and instant. The problem is what happens next: the brain registers the event as "I survived because I avoided" - and the threat rating of that situation increases. The next time the person approaches it, anxiety is higher. Avoidance relieves anxiety in the short term and worsens it systematically over time.</p> <p><strong>Safety behaviors - the subtler form of avoidance:</strong> Safety behaviors are partial avoidance. The person enters the situation but uses strategies to reduce anxiety and prevent the feared outcome. Examples:</p> <ul> <li><strong>Social anxiety:</strong> Holding a drink to conceal hand tremor, over-preparing conversation scripts, only attending events with a safe person, sitting near exits, avoiding eye contact</li> <li><strong>Panic disorder:</strong> Carrying medication "just in case," sitting near exits, always having a phone ready to call for help, avoiding exercise because it raises heart rate</li> <li><strong>Health anxiety:</strong> Repeatedly checking pulse or a body part, Googling symptoms, seeking reassurance from a doctor or family member</li> <li><strong>Agoraphobia:</strong> Only travelling short distances from home, always being accompanied, planning routes past hospitals or medical centers</li> <li><strong>GAD:</strong> Repeatedly asking others for reassurance, checking and rechecking decisions, seeking certainty before acting</li> </ul> <p><strong>Why safety behaviors maintain anxiety:</strong> The brain learns from experience. When a person uses a safety behavior and nothing bad happens, they conclude: "I was okay because of the safety behavior, not because the situation was actually safe." This prevents the most important learning - that the feared outcome does not occur even without protection. Safety behaviors are a maintenance cycle, not a coping strategy.</p> <p><strong>Why exposure works: two mechanisms</strong></p> <ul> <li><strong>Habituation:</strong> When a person remains in a feared situation long enough, anxiety naturally reduces - the nervous system cannot maintain peak arousal indefinitely. Repeated exposures progressively lower the anxiety response. This is why it is critical to stay in the feared situation until anxiety reduces meaningfully, rather than leaving when anxiety is highest (which reinforces avoidance).</li> <li><strong>Disconfirmation:</strong> The more powerful mechanism. The feared outcome - humiliation, catastrophic illness, uncontrollable panic - does not actually occur. The person learns directly, through experience, that their threat prediction was wrong. This updates the threat model the brain holds for that situation.</li> </ul> <p><strong>The conditions for effective exposure:</strong> Exposure that is done correctly consistently works. Exposure done incorrectly consistently fails. The conditions are:</p> <ul> <li>Long enough: stay until anxiety has reduced by at least 50% from its peak. Leaving earlier teaches the opposite lesson.</li> <li>Without safety behaviors: using safety behaviors during exposure prevents the disconfirmation that makes exposure work. The whole point is to learn you are okay without protection.</li> <li>Repeated: a single exposure rarely produces lasting change. Multiple exposures to the same situation across days are needed.</li> <li>Graduated: start at a level where you can tolerate staying and build progressively.</li> </ul>'}
  ]},
  {label:'Social Anxiety',optional:false,items:[
    {id:'sa_understanding',title:'Social anxiety: the social threat system',body:'<p><strong>Social threat is evolutionarily real.</strong> For most of human evolutionary history, social exclusion was genuinely life-threatening - being expelled from the group meant no protection, no food-sharing, and death. The social threat system - which monitors for signs of rejection, judgment, and humiliation - is therefore ancient, powerful, and prone to false alarms in modern social environments where the stakes are rarely survival.</p> <p><strong>The core fear in social anxiety is negative evaluation:</strong> being judged, humiliated, or rejected. The threat-detection system has become calibrated to treat social scrutiny as dangerous. A conversation, a presentation, a social gathering, or even sending an email can activate the same physiological threat response as a genuinely dangerous situation.</p> <p><strong>Self-focused attention:</strong> When anxiety rises in social situations, attention turns inward. Rather than focusing on the conversation, the other person, or the task, the person begins monitoring their own performance: "Am I saying something stupid? Is my face red? Can they see I\'m anxious? I\'m about to go blank." This self-monitoring loop has two effects that worsen the situation:</p> <ul> <li>It consumes cognitive resources needed for actually performing the social task - so performance genuinely deteriorates, which then feeds the anxiety.</li> <li>It amplifies awareness of internal symptoms (heart rate, blushing, voice tremor) that others may not notice at all.</li> </ul> <p><strong>The audience illusion:</strong> Socially anxious people carry a mental image of how they appear to others - and that image is distorted. They imagine they appear far more visibly anxious, foolish, or incompetent than they actually do. When people with social anxiety are shown video recordings of themselves in social situations, they almost universally discover that their internal experience bears little resemblance to what others actually see.</p> <p><strong>Pre-event processing:</strong> Before social situations, people with social anxiety engage in extensive mental rehearsal - anticipating what will go wrong, scripting responses, imagining catastrophic outcomes. This increases anxiety going in and depletes cognitive resources.</p> <p><strong>Post-event processing:</strong> After social situations, the same system replays the event - but selectively. The mind focuses on moments of awkwardness, things that "went wrong," perceived reactions of others interpreted through a negative lens. Positive interactions and neutral moments are filtered out. This post-event processing maintains and strengthens the threat model for social situations.</p> <p><strong>Safety behaviors in social contexts</strong> include: avoiding eye contact, over-preparing and scripting conversations, speaking quickly to fill silence before being judged, holding a drink to conceal hand tremor, always attending events with a "safe person," sitting near exits, wearing concealing clothing to hide blushing. Each of these prevents the disconfirmation that would reduce anxiety.</p>'},
    {id:'sa_management',title:'Managing social anxiety: strategies that work',body:'<p><strong>Shift attention outward.</strong> This is the single most powerful technique for reducing anxiety in social situations, and the most counterintuitive. When anxiety rises in a social situation, the instinct is to focus inward - monitoring performance, checking symptoms, evaluating how you are coming across. Deliberately reversing this - directing genuine curiosity outward toward the other person - reduces anxiety and simultaneously improves performance. In practice: genuinely listen to what the other person is saying. Notice what they look like. Wonder what they might be thinking or feeling. This is not a distraction technique - it is redirecting attention to where it belongs in a social exchange. The self-consciousness dissolves because there is nothing monitoring the self.</p> <p><strong>Drop safety behaviors systematically.</strong> List every safety behavior you use in social situations. Then begin removing them, starting with smaller ones and working toward larger ones. The process feels exposing and anxiety-provoking - that is exactly the point. The purpose is to learn that you are okay without the protection. When you discover you can speak in a meeting without your prepared script and the world does not end, the threat model updates.</p> <p><strong>Behavioral experiments.</strong> These are distinct from exposure: the purpose is to gather specific evidence about a specific prediction. Format:</p> <ul> <li>State the prediction precisely: "If I pause in conversation for 3 full seconds without filling the silence, the other person will think I am stupid or boring."</li> <li>Design the test: in the next conversation, deliberately pause for 3 seconds and observe what actually happens.</li> <li>Record the result: what did the other person actually do? Did the feared outcome occur?</li> </ul> <p>The key is specificity - testing the exact feared prediction rather than just "going into social situations." Common experiments: maintaining eye contact for longer than usual, pausing before responding, disclosing something minor that feels risky, asking a question when you don\'t know the answer.</p> <p><strong>Video feedback.</strong> If you believe you appear far more anxious than you actually do - which is almost always the case - record yourself in a low-stakes social situation (a work meeting on video call, a conversation with a friend) and watch the recording. Most people with social anxiety find this confronting at first and then relieving: the internal experience of visible anxiety is dramatically worse than what actually appears on screen. This directly updates the distorted audience illusion.</p> <p><strong>Stop post-event processing.</strong> When you notice yourself replaying and analyzing a social interaction afterward, label what is happening: "I am post-event processing again." Then redirect attention to something external and concrete - a task, a physical sensation, the environment. If you feel you must review the event: allow yourself one brief review, no longer than 5 minutes. During that review, actively look for things that went well, or at least neutrally. Then end it deliberately. Replaying events indefinitely, with a focus on failures, provides the fuel that maintains social anxiety.</p> <p><strong>Exposure hierarchy.</strong> Build a graduated list of social situations from least to most anxiety-provoking (rated 0-100). Start where you can tolerate staying. The crucial point: enter the situation and remain there until anxiety reduces substantially, without using safety behaviors. The exposure itself is less important than what you do inside it.</p> <p><strong>Medication for social anxiety.</strong> SSRIs are first-line: sertraline, escitalopram, and fluoxetine are all effective and well tolerated. Paroxetine has the strongest evidence base for social anxiety disorder specifically, including TGA registration for this indication, but is the most difficult SSRI to discontinue due to its short half-life and discontinuation syndrome - most psychiatrists do not recommend it as a first choice for this reason. Venlafaxine (SNRI) also has strong evidence and is a reasonable first-line option. For performance-specific situations (a presentation, interview, or exam) where cognitive anxiety is not the main problem: propranolol 10-40mg taken 30-60 minutes beforehand reduces the physical symptoms (tremor, palpitations, sweating) without affecting cognitive anxiety. Short-acting benzodiazepines PRN for unavoidable high-stakes specific situations are occasionally appropriate but should not become a regular strategy.</p>'}
  ]},
  {label:'Panic Disorder',optional:false,items:[
    {id:'pd_understanding',title:'Panic disorder: the false alarm that becomes a trap',body:'<p><strong>A panic attack is the threat alarm firing at full intensity in the absence of genuine danger.</strong> The physiology is identical to what would happen if you were in immediate mortal danger - heart racing, breathing changed, derealization, dizziness, tingling, chest tightness, terror. None of it is medically dangerous. The sensations are produced by the same adrenaline surge that would help you survive a physical threat. They are unpleasant and frightening but not harmful.</p> <p><strong>What happens during a panic attack:</strong></p> <ul> <li>Adrenaline and noradrenaline surge from the adrenal glands</li> <li>Heart rate increases sharply - felt as pounding, racing, or "fluttering"</li> <li>Breathing changes: faster and shallower, altering the CO2-oxygen balance in blood. This causes tingling in the extremities, lightheadedness, and derealization - all explained by the physiology, all reversible, all harmless</li> <li>Muscles tense, chest tightens</li> <li>Derealization ("the world doesn\'t feel real") and depersonalization ("I don\'t feel like myself") - frightening but temporary and not dangerous</li> </ul> <p><strong>The catastrophic interpretation loop:</strong> The panic attack itself is not the disorder - it is the meaning the person applies to the sensations. When a heart rate increase is interpreted as "I am having a heart attack," that interpretation generates more anxiety, which increases the heart rate further, which confirms the catastrophic interpretation. The cycle amplifies within seconds. The sensations are real; the catastrophic interpretation is the error.</p> <p><strong>Interoceptive conditioning:</strong> After repeated panic attacks, the sensations themselves become conditioned triggers. The brain has learned that a racing heart or dizziness preceded previous panic attacks - and now those sensations alone are enough to trigger panic, independent of any external situation. A person with panic disorder may begin having panic attacks triggered by exercise (which raises heart rate), heat, caffeine, or simply lying quietly and noticing their heartbeat. The body has become the threat cue.</p> <p><strong>Panic disorder is not the panic attacks themselves - it is the fear of having panic attacks.</strong> The defining features are:</p> <ul> <li>Recurrent unexpected panic attacks (occurring without a clear situational trigger)</li> <li>Persistent concern about future attacks (anticipatory anxiety)</li> <li>Significant behavioral changes made to avoid attacks - which progressively restrict life</li> </ul> <p>Panic attacks occur in many conditions - social anxiety, GAD, specific phobias, depression. Panic <em>disorder</em> specifically requires the pattern of unexpected attacks plus preoccupation with future attacks and the avoidance behaviors that develop around them.</p>'},
    {id:'pd_management',title:'Managing panic disorder: breaking the cycle',body:'<p><strong>The counterintuitive first step: stop trying to prevent panic attacks.</strong> Every strategy aimed at preventing panic - monitoring your body for warning signs, avoiding situations where you might have an attack, carrying rescue medication, planning escape routes, always knowing where a hospital is - is maintaining the disorder. These behaviors signal to the brain that panic is genuinely dangerous, which increases vigilance, which increases anxiety, which increases the likelihood of panic. The path out begins with stopping the prevention strategies.</p> <p><strong>Interoceptive exposure - the most powerful technique for panic disorder:</strong> Most people with panic disorder have never heard of this. It involves deliberately inducing the physical sensations associated with panic in a controlled setting, to desensitize the brain to those sensations. The mechanism is disconfirmation: you experience the sensations, discover they are harmless, and the brain updates its threat rating.</p> <p>Exercises - try each and rate how closely it matches your panic sensations (0-10):</p> <ul> <li>Hyperventilate (breathe fast and shallow) for 30 seconds</li> <li>Spin in an office chair for 30 seconds</li> <li>Breathe through a narrow coffee stirrer for 2 minutes</li> <li>Run on the spot vigorously for 1 minute</li> <li>Stare at a single spot on the wall without blinking for 90 seconds</li> <li>Tense all your muscles at once for 30 seconds</li> </ul> <p>Repeat the exercises that match your sensations daily until the sensations no longer trigger fear. This takes persistence - the exercises feel bad initially and that is exactly why they work. You are learning, through direct experience, that the sensations are survivable without catastrophe.</p> <p><strong>During a panic attack - what to actually do:</strong></p> <ul> <li><strong>Do not fight it or try to make it stop.</strong> Resistance amplifies panic. "I need this to stop NOW" is a threat signal that increases arousal.</li> <li><strong>The narrative matters:</strong> "This is my alarm system activating. The sensations are unpleasant and not dangerous. This will pass." Say this to yourself and mean it.</li> <li><strong>Allow the sensations without adding secondary fear.</strong> The primary fear (the sensations) is manageable. The secondary fear ("I am going to die / have a heart attack / go mad") is what escalates the attack. Drop the secondary interpretation.</li> <li><strong>Most panic attacks peak at 2-4 minutes and resolve within 10 minutes.</strong> You can tolerate 10 minutes of discomfort.</li> <li><strong>Stay where you are if at all possible.</strong> Leaving reinforces the belief that the situation was dangerous and that leaving was what kept you safe.</li> <li><strong>Do NOT breathe into a paper bag.</strong> This is folk advice with no evidence and can cause CO2 retention, which worsens symptoms.</li> <li><strong>Slow, diaphragmatic breathing</strong> can reduce arousal, but only if used as a calming technique, not as a strategy to suppress or escape the panic. Breathing to escape is another safety behavior.</li> </ul> <p><strong>Drop safety behaviors:</strong> Having your phone out ready to call emergency services, sitting near exits, always carrying water, avoiding exercise because it raises your heart rate, always being with someone - each of these maintains the disorder by preventing the disconfirmation that panic sensations are harmless.</p> <p><strong>Situational exposure:</strong> Build a graduated hierarchy of situations you have been avoiding because of panic and work through it systematically, using the principles from the avoidance section - stay long enough, without safety behaviors.</p> <p><strong>Medication:</strong> SSRIs are first-line for panic disorder. A critical point: start at <strong>half</strong> the standard depression dose (e.g., sertraline 25mg not 50mg, escitalopram 5mg not 10mg) because the initial activation effect of SSRIs can trigger panic in the first 1-3 weeks. Any SSRI is effective; there is no strong evidence favouring one over another. Imipramine (TCA) has strong evidence from older trials. Benzodiazepines are effective acutely but carry significant dependence risk with regular use; they can be used sparingly PRN during the early weeks of SSRI treatment while waiting for the SSRI to take effect, but should not become a maintenance strategy.</p>'}
  ]},
  {label:'Generalised Anxiety Disorder',optional:false,items:[
    {id:'gad_understanding',title:'Generalised Anxiety Disorder: when worry becomes the problem',body:'<p><strong>GAD is not just being "an anxious person."</strong> It is a specific pattern: chronic, uncontrollable worry that spreads across multiple life domains simultaneously - health, money, relationships, work performance, safety of loved ones, minor daily matters. In any given hour, a person with GAD may be worrying about whether they responded to an email correctly, whether their child is safe at school, whether a minor physical symptom means something serious, and whether they will be able to afford a car service. The content shifts; the worry itself never stops.</p> <p><strong>Intolerance of uncertainty is the core driver.</strong> Not the specific content of the worry, but an inability to tolerate not knowing how things will turn out. "What if" thinking is an attempt to mentally resolve uncertainty - to anticipate every possible bad outcome and plan a response. The problem is fundamental: there is always more uncertainty. Worry cannot achieve certainty. It is a strategy that appears to be solving the problem of uncertainty while actually perpetuating it.</p> <p><strong>Positive beliefs about worry</strong> maintain the cycle even when worry is causing suffering. Common beliefs that keep people worrying even as it exhausts them:</p> <ul> <li>"Worrying shows I care about the people I love - if I stop worrying, something bad might happen to them."</li> <li>"If I worry about all the things that could go wrong, I won\'t be caught off guard."</li> <li>"Worrying helps me prepare and perform better."</li> </ul> <p>These beliefs are not irrational on the surface - but they attribute to worry an efficacy it does not have. Worry does not prevent bad things from happening. And the cost is enormous: chronic physical tension, cognitive exhaustion, disrupted sleep, and impaired quality of life.</p> <p><strong>The cognitive avoidance hypothesis</strong> (Borkovec\'s model): Worry is verbal-linguistic cognitive activity - words and sentences in the mind. Threatening material is more naturally processed as imagery - mental pictures of feared outcomes. Worry, by staying in the verbal domain, actually prevents the brain from fully processing the feared material as imagery. This suppresses the emotional response in the short term (which feels like the worry is "doing something") but prevents the fear extinction that would occur if the emotional material were fully processed. Worry is, paradoxically, a form of avoidance.</p> <p><strong>Physical symptoms of GAD:</strong> Chronic muscle tension (particularly in the jaw, neck, and shoulders), fatigue from constant low-level activation, difficulty concentrating (described as "my mind is somewhere else"), irritability, headaches, and disrupted sleep - particularly difficulty falling asleep because the mind is still generating worry at bedtime.</p>'},
    {id:'gad_management',title:'Managing GAD: practical strategies',body:'<p><strong>Scheduled worry time (worry postponement).</strong> This sounds too simple to work. It has good evidence. The procedure:</p> <ul> <li>Choose a specific 20-minute daily "worry time" - the same time each day. Not near bedtime. Not in bed. A chair in a specific room works well.</li> <li>When you notice yourself worrying outside that time: write the worry down on a designated list. Do not engage with it. Tell yourself: "I will give this my full attention at [time]."</li> <li>During the scheduled 20 minutes: sit down with the list and actively worry about everything on it.</li> </ul> <p>What you discover: many worries feel less urgent by the time you get to them, or have already resolved without any action. Some still feel pressing - and you can now engage with those specifically. The function of this technique is not to eliminate worry but to contain it within a defined boundary rather than having it spread across the entire day. You are not avoiding the worry - you are postponing it intentionally.</p> <p><strong>Distinguishing productive from unproductive worry:</strong></p> <ul> <li><strong>Productive worry:</strong> A specific, concrete, solvable problem with an action available now. Example: "I haven\'t replied to an important email and I\'m worried about it." Action: reply to the email immediately. This is problem-solving, not worry management.</li> <li><strong>Unproductive worry:</strong> A hypothetical future event, an outcome outside your control, or a problem with no action currently available. Example: "I\'m worried something bad might happen to my child." There is no action available that addresses this worry. It requires uncertainty tolerance, not problem-solving.</li> </ul> <p>The key question is: "Is there a specific action I can take right now that would address this problem?" If yes - do it immediately and drop the worry. If no - classify it as unproductive and apply worry postponement or acceptance-based work.</p> <p><strong>Uncertainty tolerance experiments.</strong> Graduated practice in tolerating not knowing:</p> <ul> <li>Start small: check a parcel tracking or flight status only once, then commit to not checking again for 3 hours. Notice that you survived not knowing.</li> <li>Medium: leave a text message unread until the morning. Once you have made a decision, resist seeking reassurance about it from another person.</li> <li>Larger: book a travel itinerary without researching every possible contingency. Take a route you have not driven before without mapping alternatives in advance.</li> </ul> <p>The goal is not to achieve certainty - it is to build the capacity to function without it. This is a skill that develops through practice and degrades without it.</p> <p><strong>Stimulus control for worry.</strong> Designate worry-free zones in your daily environment: bed and the bedroom are the most important. If you are in bed and noticing yourself worrying: get up, move to a chair, write the worry on your postponement list, then return to bed. Over time, this breaks the association between the bed and worry, which directly improves sleep.</p> <p><strong>Mindfulness in GAD.</strong> The most relevant technique for GAD is defusion from thoughts - creating psychological distance from worrying rather than treating each worry as a factual statement requiring a response. "I notice my mind is generating worry about X again" is qualitatively different from engaging with the content of the worry as if it were real. This reduces the sense of urgency without fighting the thoughts.</p> <p><strong>Medication:</strong> SSRIs (escitalopram, sertraline, paroxetine) and SNRIs (venlafaxine, duloxetine) are first-line - onset 2-4 weeks, full effect 8-12 weeks. Pregabalin has good evidence specifically for GAD, with onset within approximately one week - faster than SSRIs, which is useful when rapid relief is needed. Buspirone (a partial 5-HT1A agonist) has strong evidence for GAD and zero addiction risk. It is significantly under-used because it requires 2-4 weeks for effect and is often abandoned before it works. Important: buspirone does not work in people who have recently used benzodiazepines regularly, because recent benzodiazepine exposure blunts its efficacy. Hydroxyzine (antihistamine) has rapid onset and is not addictive - useful for short-term anxiolysis when benzodiazepines are not appropriate.</p>'}
  ]},
  {label:'Agoraphobia',optional:false,items:[
    {id:'ago_understanding',title:'Agoraphobia: the shrinking world',body:'<p><strong>The common misconception:</strong> "fear of open spaces." The actual clinical definition is fear of situations where <strong>escape would be difficult</strong> or where <strong>help would be unavailable</strong> if something went wrong - typically a panic attack or sudden incapacitation. The common thread is not the physical space but the loss of access to safety or help.</p> <p><strong>Feared situations</strong> typically include: public transport (particularly when it cannot stop), cars on motorways or in tunnels, crowds, supermarkets, cinemas, restaurants, bridges, lifts, being alone at home, being far from familiar locations or known medical facilities.</p> <p><strong>Two forms of agoraphobia:</strong></p> <ul> <li><strong>With panic disorder (the more common form):</strong> Develops as a direct consequence of panic attacks. After having panic attacks in public situations, the person begins avoiding places where they have had attacks or where an attack would be particularly difficult to manage. The agoraphobic avoidance is a logical (if counterproductive) response to the perceived danger of panic.</li> <li><strong>Without panic disorder:</strong> Fear of being incapacitated, embarrassed, or unable to receive help in public situations - without necessarily having full panic attacks. Can include fear of fainting, losing control of bowel or bladder, or having a medical emergency.</li> </ul> <p><strong>The shrinking world:</strong> Avoidance in agoraphobia tends to escalate progressively. The "safe zone" - the range of situations the person can tolerate - contracts steadily. What begins as avoiding the supermarket extends to avoiding shopping centres, then unfamiliar neighborhoods, then any travel beyond a few blocks. Without treatment, some people become completely housebound. The mechanism is the same as all avoidance: each avoided situation reinforces the threat rating of that situation and of the next tier above it.</p> <p><strong>Safety signals:</strong> Specific people, objects, or behaviors that allow the person to enter feared situations without full anxiety - a partner accompanying them, a phone within reach, a seat near the exit, knowing the location of the nearest hospital. Safety signals maintain agoraphobia by the same mechanism as safety behaviors: the person concludes "I was okay because I had my safety signal, not because I was actually safe." The threat belief is never directly disconfirmed.</p> <p><strong>Secondary depression</strong> is common in prolonged agoraphobia - the progressive restriction of activities and social contact, combined with the loss of valued life roles, produces significant depressive symptoms in a substantial proportion of people with established agoraphobia.</p>'},
    {id:'ago_management',title:'Managing agoraphobia: reclaiming your world',body:'<p><strong>Graduated exposure hierarchy - the evidence-based treatment for agoraphobia.</strong> The structure:</p> <ul> <li>Rate each situation on Subjective Units of Distress (SUDS), 0-100</li> <li>Build a hierarchy from around 20-30 SUDS up to 90+ SUDS</li> <li>Work through systematically, starting where you can succeed and building upward</li> </ul> <p>Example hierarchy (these will be personal - create your own):</p> <ul> <li>Walking to the letterbox alone (20)</li> <li>Walking to the end of the street (30)</li> <li>Short bus trip of one stop (40)</li> <li>Quiet local shop at a low-traffic time (50)</li> <li>Supermarket alone on a weekday morning (60)</li> <li>Busy shopping centre alone on a weekday (70)</li> <li>Supermarket alone at peak time on a weekend (80)</li> <li>Full busy shopping centre on a Saturday afternoon, alone (90)</li> </ul> <p><strong>How to do exposures correctly - the rules that determine whether they work:</strong></p> <ul> <li><strong>Stay in the situation until anxiety reduces by at least 50% from its peak.</strong> This typically takes 20-45 minutes. Leaving when anxiety is highest is the single most common error - it reinforces avoidance directly.</li> <li><strong>Do not use safety signals.</strong> Leave the partner at home. Do not take the phone out and hold it. Sit in the middle of the bus rather than at the end near the door. The purpose is to learn that you are safe without the safety signal - you cannot learn this while the signal is present.</li> <li><strong>Frequency matters enormously:</strong> Daily exposures are far more effective than once-weekly exposures. If you can manage 5-7 exposures per week, progress will be substantially faster than 1-2 per week.</li> <li><strong>Record your SUDS</strong> before entering, at the peak, and after leaving. This creates a written record showing that anxiety reduced - which becomes evidence you can refer back to when anxiety predicts that "this time it will be different."</li> </ul> <p><strong>The "good enough" trap:</strong> A very common pattern is that people do enough exposure to reach a functional level and then stop before completing the upper levels of the hierarchy. Without completing the full hierarchy, the gains are partial and relapse is common. The hardest items in the hierarchy matter - push all the way to the top.</p> <p><strong>Driving hierarchy</strong> (a frequent specific area): quiet local roads for short distances, longer familiar drives, unfamiliar routes, dual carriageways, motorways, driving alone, driving at night, driving long distances alone without a companion. The same rules apply: stay on the road rather than exiting early when anxiety rises, without having the phone visible on the seat as a safety signal.</p> <p><strong>Medication:</strong> SSRIs significantly reduce agoraphobic avoidance, particularly when panic disorder is co-occurring. The practical role of medication is to reduce the intensity of anxiety sufficiently to make initial exposures more accessible - many people find the first steps of the hierarchy impossible without some pharmacological support. Medication does not replace exposure; it creates a lower starting point from which exposure becomes possible.</p>'}
  ]},
  {label:'Health Anxiety',optional:false,items:[
    {id:'ha_understanding',title:'Health anxiety: when vigilance backfires',body:'<p><strong>Health anxiety is not attention-seeking, hypochondria as a character trait, or a personality problem.</strong> It is genuine distress driven by a specific and well-understood cognitive and behavioral mechanism. Understanding that mechanism is the first step toward changing it.</p> <p><strong>The attention-amplification loop:</strong> When you focus sustained attention on a body area, you notice more sensations in that area. Those sensations feel more intense. The increased intensity draws more attention. This is normal, reproducible physiology. Anyone can produce awareness of their heartbeat, dizziness, throat tightness, or chest sensations by focusing on them for a few minutes. For people with health anxiety, this normal mechanism has been hijacked by threat appraisal - the sensations are noticed, interpreted as potentially dangerous, and attended to further, which amplifies them further, which increases the perceived threat.</p> <p><strong>The checking trap:</strong> Examining a symptom - checking a lump, taking your pulse, pressing on a tender area, looking in the mirror at a spot - provides momentary reassurance. Within minutes or hours, the reassurance fades and the urge to check returns, usually stronger. Each check restarts the attention-amplification loop. The behavior that provides relief is also the behavior that maintains the anxiety.</p> <p><strong>The reassurance-seeking trap:</strong> Asking your GP "is this okay?", Googling symptoms, asking a family member "does this look normal to you?" Each instance provides brief relief followed by return of anxiety, typically at higher intensity than before. The relief acts as a powerful reinforcer - it is the reason people keep doing it even when they recognize that it doesn\'t work in the long run.</p> <p><strong>Medical investigations:</strong> Paradoxically, normal results can maintain health anxiety rather than resolving it. After receiving a normal test result, the anxiety relieves briefly, then: "But what if the test missed something?" or "Maybe it\'s a different problem - that test didn\'t check for X." Each investigation can shift attention to the next potential concern. This does not mean investigations are never appropriate - it means that for health anxiety specifically, the investigation itself does not treat the underlying problem.</p> <p><strong>Internet symptom checking:</strong> Search algorithms surface serious diagnoses because they generate high engagement. A person with a headache who searches symptoms will encounter brain tumors, aneurysms, and meningitis within two minutes. This is not because those are the likely causes of the headache - it is because those diagnoses generate the most clicks. Health anxiety and internet symptom checking are a particularly destructive combination.</p> <p><strong>Selective attention to body "noise":</strong> A healthy body produces hundreds of sensations daily - minor aches, momentary palpitations, digestive activity, skin sensations - that are filtered out when the threat-detection system does not flag them as dangerous. Health anxiety removes this filter. The person notices far more body sensations than others would, and each one is a potential source of concern.</p>'},
    {id:'ha_management',title:'Managing health anxiety: the counterintuitive approach',body:'<p><strong>Stop Googling symptoms.</strong> This is the most important first step and it is non-negotiable. Not "reduce" - stop entirely. If you have a symptom concern, write it down and bring it to a scheduled appointment with your GP. The first few days after stopping will feel worse: the immediate relief of checking is removed and the anxiety may spike. This is expected and it resolves. Every time you check symptoms online, you are reinforcing the checking behavior, feeding the attention-amplification loop, and exposing yourself to worst-case scenarios that are almost never relevant to your situation.</p> <p><strong>Reduce body checking gradually, with a plan.</strong> Cold turkey on all checking simultaneously usually fails. A structured approach works better:</p> <ul> <li>First, map your checking behavior specifically: what do you check, when, how often, and what triggers it? Write this down.</li> <li>Then reduce gradually using a schedule: if you check your pulse 8 times a day, reduce to 4 times, then 2, then 1, then only when a genuine health decision requires it.</li> <li>Apply the same approach to each checking behavior in turn.</li> </ul> <p>The goal is not to never think about your health - it is to bring the checking behavior back into proportion with actual clinical need.</p> <p><strong>Attention retraining.</strong> When you notice yourself scanning your body for symptoms, deliberately redirect attention to an external focus: a task you are doing, the conversation you are in, the environment around you. This is a skill that requires deliberate practice. Initially the attention returns quickly to the body - redirect again without frustration. Over days and weeks of practice, the redirecting becomes easier and the automatic body-scanning reduces.</p> <p><strong>Behavioral experiments</strong> are particularly powerful in health anxiety because they directly test the mechanism:</p> <ul> <li>"If I focus my attention on my throat for 5 minutes, will I notice more sensations than if I am engaged in a task?" Test it. Answer: yes, every time. This demonstrates the attention mechanism directly, in your own experience, not as an abstract concept.</li> <li>"If I do 10 minutes of vigorous exercise (raising my heart rate substantially), will the physical sensations cause harm?" Test it. Answer: no. This directly disconfirms the feared outcome and breaks the association between physical sensations and danger.</li> </ul> <p><strong>Structured medical care.</strong> Work with your GP to establish an appropriate review schedule rather than seeking contact whenever a concern arises. A scheduled appointment in 4 weeks is less anxiety-provoking in the medium term than an open-ended invitation to call anytime - because the scheduled appointment actually contains the anxiety rather than leaving it open. Aim to bring multiple concerns to one appointment rather than making contact repeatedly for individual symptoms.</p> <p><strong>Decision rules for when a symptom genuinely warrants medical attention:</strong></p> <ul> <li>A new symptom that is changing or worsening over more than 2 weeks</li> <li>Accompanied by unexplained weight loss, blood, or night sweats</li> <li>In the context of established relevant risk factors (personal or family history of specific conditions)</li> <li>The rule: bring it to your GP once, have the assessment, then accept the outcome as your information. One assessment, not repeated re-checks of the same concern.</li> </ul> <p><strong>Medication:</strong> SSRIs are first-line for health anxiety - escitalopram, paroxetine, and fluoxetine all have evidence. The mechanism appears to be the same as for other anxiety disorders: reduction in threat sensitivity and improved ability to tolerate uncertainty.</p>'}
  ]},
  {label:'Trait Anxiety',optional:false,items:[
    {id:'ta_understanding',title:'Trait anxiety: a tuned-up nervous system',body:'<p><strong>What trait anxiety is:</strong> Trait anxiety (corresponding to the "Neuroticism" or "N" dimension in all major personality models, including the Big Five) is a stable, dispositional tendency to experience anxiety, negative affect, and threat vigilance across a wide range of situations. It is not the same as an anxiety disorder - it is the underlying temperamental dimension that makes anxiety disorders more likely.</p> <p><strong>How heritable is it?</strong> Approximately 40-60%. This is a substantially genetic characteristic, not primarily the result of upbringing, life events, or personal failing. People with high trait anxiety often describe having always been "a worrier" from childhood - this is consistent with a temperamental basis rather than a purely learned one.</p> <p><strong>Neurobiology:</strong> People with high trait anxiety show higher baseline amygdala reactivity (the threat-detection system fires more easily and more intensely), a greater early perceptual bias toward threatening information (threat cues are detected more readily in the environment), and lower resting serotonergic inhibitory tone (less natural dampening of the threat response). These are measurable neurobiological differences, not character weaknesses.</p> <p><strong>Trait anxiety is not a disorder.</strong> It is a dimension. Many people with high trait anxiety have full, productive, deeply meaningful lives. High trait anxiety does not prevent success, connection, or wellbeing - it makes certain things harder without making them impossible.</p> <p><strong>But it is a vulnerability factor</strong> for all anxiety disorders, major depression, and stress-related conditions. Not because it causes these disorders directly, but because it lowers the threshold for them - less stress is required to push a high-trait-anxiety person across the threshold into a clinical disorder. This means that managing the trait is, in part, a prevention strategy.</p> <p><strong>The misattribution problem:</strong> People with high trait anxiety typically attribute their anxiety to their current circumstances: "I\'m anxious because of this job / this relationship / this financial situation." The implicit belief is: "If the circumstances change, the anxiety will go away." When circumstances change, the trait reasserts itself in a new domain - the anxiety finds a new object. This pattern leads to repeatedly changing external circumstances (jobs, relationships, locations) in search of relief that does not last, because the source of the anxiety is internal and stable.</p> <p><strong>The upside of the same trait:</strong> High trait anxiety commonly co-occurs with conscientiousness, empathy, attentiveness to detail, emotional depth, and preparedness. The same nervous system tuning that makes anxiety more accessible also tends to make the person more attuned to others, more careful, and more thorough. This is worth acknowledging: it is not a purely negative characteristic.</p>'},
    {id:'ta_management',title:'Managing high trait anxiety: the long game',body:'<p><strong>The goal is not to eliminate trait anxiety.</strong> You cannot change a trait with treatment - the heritability data tells us this is a stable biological characteristic. The goal is to reduce the suffering it causes and prevent it from crossing the threshold into clinical disorders. This is a different framing from treating an episode: it is ongoing management of a characteristic, not cure of a condition.</p> <p><strong>Acceptance and defusion (ACT-based approaches - most appropriate for trait anxiety):</strong></p> <ul> <li><strong>Recognition:</strong> Understanding the trait as a stable feature of your nervous system, not as evidence of danger ("the anxiety must mean something is actually wrong") or weakness ("I shouldn\'t feel this way").</li> <li><strong>Defusion:</strong> Creating distance from anxious thoughts rather than treating them as facts. "I notice my mind is generating catastrophic predictions about X again" is different from engaging with those predictions as accurate information requiring a response. The thought is real; the content is not necessarily true.</li> <li><strong>Values-based action:</strong> Continuing to live according to what matters to you even when the anxious mind generates objections. The anxious mind will always generate objections. The question is not "will I feel anxious if I do this?" but "is this something I value enough to do even if I feel anxious?"</li> </ul> <p><strong>Exercise - the most robustly evidenced lifestyle intervention for anxiety:</strong></p> <ul> <li>Aerobic exercise at moderate intensity for 150 minutes per week (30 minutes, 5 days) reduces baseline anxiety substantially in people with high trait anxiety.</li> <li>The mechanism is multiple: normalisation of HPA axis reactivity (the stress response becomes less hair-trigger), attenuation of amygdala hyperreactivity over time, and increased brain-derived neurotrophic factor (BDNF), which supports neuroplasticity.</li> <li>Effect size comparable to medication for generalised anxiety.</li> <li>Resistance training has emerging evidence as well, though the aerobic evidence is stronger.</li> <li>The effect is dose-dependent and cumulative - it does not work as a one-off, but as a consistent practice it is one of the most powerful tools available.</li> </ul> <p><strong>Sleep:</strong> Non-negotiable. Sleep deprivation dramatically amplifies amygdala reactivity - a single night of poor sleep can measurably increase anxious responding the following day. For people with high trait anxiety, consistent, adequate sleep is a primary intervention, not an optional lifestyle choice.</p> <p><strong>Caffeine:</strong> Genuinely amplifies anxiety in people with high negative affect through adenosine receptor blockade and direct sympathetic nervous system activation. Most people with high trait anxiety notice a meaningful improvement in baseline anxiety when they reduce or eliminate caffeine substantially. This is worth a deliberate trial: reduce to zero for two weeks and observe the effect.</p> <p><strong>Alcohol:</strong> Temporarily reduces anxiety through GABA-A potentiation - this is why it is appealing. The problem is rebound: as alcohol is metabolised, GABA inhibition is withdrawn and sympathetic activity increases, producing a period of heightened anxiety (typically the following morning). Regular alcohol use raises baseline anxiety over time. People with high trait anxiety are at elevated risk of developing anxiety-motivated drinking - using alcohol to manage anxiety - which creates a pattern that progressively worsens both the anxiety and the drinking.</p> <p><strong>Rumination reduction:</strong> High trait anxiety is associated with chronic ruminative thinking - replaying past events, generating negative interpretations, predicting future difficulties. Strategies:</p> <ul> <li>Scheduled reflection time (same mechanism as worry postponement for GAD): contain rumination to a specific 15-minute daily slot rather than allowing it to spread across the day.</li> <li>Physical activity is the most effective acute rumination interrupter - it shifts default mode network activity (the brain network responsible for self-referential and ruminative thought) toward task-positive network activity.</li> <li>Defusion: notice the rumination, label it ("my mind is in replay mode"), and gently redirect without suppression. Suppression amplifies rumination.</li> </ul> <p><strong>Distress tolerance:</strong> Not every uncomfortable emotion requires immediate resolution. Gradually practice tolerating uncertainty and discomfort without taking action to remove them - checking, seeking reassurance, or changing the situation. This builds a capacity that protects against developing clinical anxiety disorders when circumstances are difficult.</p> <p><strong>When to seek specific treatment:</strong> If trait anxiety has crossed the threshold into a clinical disorder - meeting criteria for GAD, social anxiety disorder, panic disorder, or health anxiety - evidence-based specific treatment for that disorder is appropriate and effective. For trait anxiety that is not disorder-level, the lifestyle strategies above combined with periodic ACT-focused therapy (not just supportive counselling) represent the most evidence-aligned approach.</p>'}
  ]},
  {label:'Medications',optional:true,items:[
    {id:'med_ssri_snri',title:'SSRIs and SNRIs for anxiety disorders',body:'<p><strong>SSRIs (selective serotonin reuptake inhibitors) and SNRIs (serotonin-noradrenaline reuptake inhibitors) are first-line pharmacological treatment for all anxiety disorders.</strong> This includes social anxiety disorder, panic disorder, GAD, health anxiety, and agoraphobia. They are not addictive and do not produce tolerance to their anxiolytic effect.</p> <p><strong>Why they work:</strong> The mechanism is more complex than simply "increasing serotonin." Chronic treatment at therapeutic doses produces downstream effects including: reduction in amygdala hyperreactivity (the threat-detection system becomes less hair-trigger), facilitation of fear extinction learning (making exposure therapy more effective), and normalisation of HPA axis dysregulation. These changes take weeks to develop - which is why the onset is delayed and why short trials are meaningless.</p> <p><strong>CRITICAL: anxiety often worsens before it improves.</strong> In the first 1-3 weeks of starting an SSRI or SNRI, increased jitteriness, restlessness, and anxiety is common - this is the "activation effect." It is caused by the early serotonergic stimulation before the downstream adaptive changes have occurred. It is temporary, but it causes many people to stop medication before it has had a chance to work, concluding that "it made me worse."</p> <ul> <li>Start at lower doses than used for depression - e.g., sertraline 25mg (not 50mg), escitalopram 5mg (not 10mg) - to reduce this initial activation phase</li> <li>Warn the person before starting that worsening of anxiety in the first 2 weeks is expected and does not mean the medication is wrong</li> <li>The activation phase resolves; persisting through it is worth it</li> </ul> <p><strong>Timeline:</strong> Anxiolytic effect begins 2-4 weeks. Full therapeutic effect at 8-12 weeks. Do not evaluate whether the medication is working until at least 8 weeks at an adequate dose.</p> <p><strong>Duration:</strong> Anxiety disorders typically require 12 months or more of continuous treatment. Most guidelines recommend 18-24 months after full symptom remission before attempting dose reduction. Reduction should be slow - no more than 25% every 4-8 weeks minimum. Rapid discontinuation causes both discontinuation symptoms and high relapse rates.</p> <p><strong>Which SSRI/SNRI for which condition:</strong></p> <table> <tr><th>Condition</th><th>First-line agents</th><th>Notes</th></tr> <tr><td>Social Anxiety Disorder</td><td>Sertraline, escitalopram, venlafaxine</td><td>Paroxetine has TGA registration for social anxiety but difficult discontinuation syndrome; not recommended as first choice. Venlafaxine well-evidenced.</td></tr> <tr><td>Panic Disorder</td><td>Sertraline, escitalopram, any SSRI</td><td>Start at HALF the standard dose to reduce initial activation triggering panic; imipramine (TCA) also has strong evidence from older trials.</td></tr> <tr><td>GAD</td><td>Escitalopram, duloxetine, venlafaxine</td><td>Duloxetine and venlafaxine useful when comorbid pain or fatigue is present. Escitalopram has particularly strong evidence for GAD.</td></tr> <tr><td>Health Anxiety</td><td>Escitalopram, paroxetine, fluoxetine</td><td>Evidence base smaller than for other anxiety disorders but consistent across trials.</td></tr> <tr><td>Agoraphobia</td><td>Same agents as for panic disorder (usually co-occurring)</td><td>Medication reduces anxiety intensity enough to make exposure more accessible - does not replace exposure work.</td></tr> </table>'},
    {id:'med_other_anxiety',title:'Other medications: benzodiazepines, pregabalin, buspirone, propranolol',body:'<p>The following table compares the main non-SSRI/SNRI options for anxiety:</p> <table> <tr><th>Medication</th><th>Mechanism</th><th>Best for</th><th>Onset</th><th>Addiction risk</th><th>Key notes</th></tr> <tr><td>Benzodiazepines (diazepam, clonazepam, lorazepam, oxazepam)</td><td>GABA-A potentiation</td><td>Acute anxiety; PRN for unavoidable situations</td><td>Minutes</td><td>HIGH</td><td>Not for maintenance. Max 2-4 times per month to avoid tolerance. Avoid alprazolam (highest addiction risk of the class).</td></tr> <tr><td>Pregabalin</td><td>Calcium channel alpha-2-delta ligand; reduces excitatory neurotransmitter release</td><td>GAD; some social anxiety</td><td>Days (approximately 1 week)</td><td>Low-moderate</td><td>Faster onset than SSRIs. Side effects: sedation, weight gain, dizziness. PBS listed for epilepsy and neuropathic pain; off-label for anxiety in Australia.</td></tr> <tr><td>Buspirone</td><td>Partial 5-HT1A agonist</td><td>GAD long-term</td><td>2-4 weeks</td><td>None</td><td>Zero addiction risk. Significantly under-used. Often abandoned before it works. Does NOT work in people who have used benzodiazepines regularly in the recent past.</td></tr> <tr><td>Propranolol</td><td>Beta-adrenergic blockade</td><td>Performance anxiety PRN (presentations, interviews, exams)</td><td>30-60 minutes</td><td>None</td><td>Reduces tremor, palpitations, sweating ONLY - does not reduce cognitive anxiety or worry. 10-40mg PRN before the event.</td></tr> <tr><td>Hydroxyzine</td><td>H1 antihistamine with 5-HT2A antagonism</td><td>Acute anxiety; short-term anxiolysis</td><td>30-60 minutes</td><td>None</td><td>Useful when benzodiazepines are contraindicated (addiction history, respiratory conditions). Not habit-forming.</td></tr> </table> <p><strong>Benzodiazepine warning - extended:</strong> Benzodiazepines work immediately and powerfully, which is exactly why they are difficult to stop. The problem is tolerance: the anxiolytic effect weakens within weeks of regular use. People who have been on regular benzodiazepines for months or years are often taking them primarily to prevent withdrawal symptoms, not to treat anxiety. Benzodiazepine withdrawal after prolonged use can be protracted, medically significant, and - in some cases - dangerous. Alprazolam (Xanax) has the highest addiction potential of the class due to its rapid onset and short half-life; most psychiatrists avoid prescribing it for anxiety disorders entirely and prefer longer-acting agents (diazepam, clonazepam) if a benzodiazepine is genuinely indicated.</p> <p><strong>Quetiapine (Seroquel) - a note:</strong> Frequently prescribed for anxiety in Australian clinical practice, often at low doses (25-50mg). The RANZCP guidelines do NOT recommend quetiapine as a first- or second-line treatment for anxiety disorders. The metabolic effects (weight gain, elevated diabetes risk), extrapyramidal effects (including tardive dyskinesia with long-term use), and sedation profile carry meaningful risk for what are, in most cases, manageable conditions with safer first-line options. If quetiapine is being considered for anxiety, it should be under specialist guidance after first- and second-line treatments have been genuinely trialled.</p>'}
  ]}
]

var GROUP_COLOR_CLASS={'null':'anx-g-core','Social Anxiety':'anx-g-social','Panic Disorder':'anx-g-panic','Generalised Anxiety Disorder':'anx-g-gad','Agoraphobia':'anx-g-ago','Health Anxiety':'anx-g-health','Trait Anxiety':'anx-g-trait','Medications':'anx-g-meds'};

function renderTopics(){
  var el=$('anx-topic-list'); if(!el) return;
  var html='';
  ANX_PE_GROUPS.forEach(function(g){
    if(g.label) html+='<div class="pe-group-label">'+(g.optional?'<span style="font-size:9px;opacity:.6;font-weight:600;margin-right:4px">OPTIONAL</span>':'')+esc(g.label)+'</div>';
    g.items.forEach(function(item){
      var done=!!sel[item.id];
      html+='<div class="pe-section'+(done?' anx-done':'')+(g.optional?' pe-optional':'')+'" data-id="'+item.id+'">';
      html+='<div class="pe-header"><span class="pe-tick-btn">'+(done?'&#9745;':'&#9744;')+'</span>';
      html+='<span class="pe-title">'+esc(item.title)+'</span>';
      html+='<span class="pe-arrow">&#9658;</span></div>';
      html+='<div class="pe-body">'+item.body+'</div></div>';
    });
  });
  el.innerHTML=html;
  el.onclick=function(e){
    var sec=e.target.closest('[data-id]'); if(!sec) return;
    var id=sec.getAttribute('data-id');
    if(e.target.classList.contains('pe-tick-btn')){
      e.stopPropagation();
      sel[id]=!sel[id];
      sec.classList.toggle('anx-done',!!sel[id]);
      sec.querySelector('.pe-tick-btn').innerHTML=sel[id]?'&#9745;':'&#9744;';
      refresh();
    } else {
      var hdr=e.target.closest('.pe-header'); if(hdr) sec.classList.toggle('pe-open');
    }
  };
}
function selectAll(){ANX_PE_GROUPS.forEach(function(g){g.items.forEach(function(item){sel[item.id]=true;});});renderTopics();refresh();}
function clearAll(){Object.keys(sel).forEach(function(k){sel[k]=false;});renderTopics();refresh();}

function buildHandout(){
  var name=f('ptName')||'Patient';
  var dr=f('drName')||'Your clinician';
  var dv=f('ptDate'),ds=dv?new Date(dv+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):'';
  var hasAny=false;
  ANX_PE_GROUPS.forEach(function(g){g.items.forEach(function(item){if(sel[item.id])hasAny=true;});});
  if(!hasAny) return null;
  var h='';
  h+='<div class="ho-header">';
  h+='<div class="ho-pt">Psychoeducation Handout — Anxiety Disorders</div>';
  h+='<div class="ho-meta">Patient: <strong>'+esc(name)+'</strong>';
  if(ds) h+=' &nbsp;|&nbsp; '+esc(ds);
  h+=' &nbsp;|&nbsp; Clinician: <strong>'+esc(dr)+'</strong></div>';
  h+='</div>';
  var currentGroup=null;
  ANX_PE_GROUPS.forEach(function(g){
    g.items.forEach(function(item){
      if(!sel[item.id]) return;
      var gKey=g.label||'null';
      if(gKey!==currentGroup){
        if(g.label){
          var cls=GROUP_COLOR_CLASS[g.label]||'anx-g-core';
          h+='<div class="ho-group-label '+cls+'">'+esc(g.label)+'</div>';
        }
        currentGroup=gKey;
      }
      h+='<div class="ho-topic">';
      h+='<div class="ho-topic-title">'+esc(item.title)+'</div>';
      h+='<div class="ho-topic-body">'+item.body+'</div>';
      h+='</div>';
    });
  });
  h+='<div class="ho-footer">This handout was prepared specifically for '+esc(name)+(ds?' following a psychiatric appointment on '+esc(ds):'')+'. It is not a substitute for clinical advice.</div>';
  return h;
}

function refresh(){
  var html=buildHandout();
  var pv=$('preview');
  if(!html){pv.innerHTML='<div class="empty-msg">Tick topics above to generate the handout.</div>';return;}
  pv.innerHTML=html;
}

function buildDocxHtml(){
  var html=buildHandout(); if(!html) return null;
  return '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'+
    '<head><meta charset="UTF-8"><style>'+
    '@page{margin:2cm 2.5cm;}body{font-family:Arial,sans-serif;font-size:11pt;line-height:1.5;color:#111;}'+
    '.ho-header{margin-bottom:14pt;padding-bottom:10pt;border-bottom:1pt solid #e5e7eb;}'+
    '.ho-pt{font-size:17pt;font-weight:bold;color:#0f172a;margin-bottom:3pt;}'+
    '.ho-meta{font-size:9pt;color:#6b7280;margin-bottom:10pt;}'+
    '.ho-group-label{font-size:8.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;margin:11pt 0 5pt;padding-bottom:2pt;border-bottom:1.5pt solid currentColor;}'+
    '.ho-group-label.anx-g-core{color:#312e81;}.ho-group-label.anx-g-social{color:#0369a1;}.ho-group-label.anx-g-panic{color:#c2410c;}.ho-group-label.anx-g-gad{color:#6d28d9;}.ho-group-label.anx-g-ago{color:#0f766e;}.ho-group-label.anx-g-health{color:#be185d;}.ho-group-label.anx-g-trait{color:#4d7c0f;}.ho-group-label.anx-g-meds{color:#92400e;}'+
    '.ho-topic{margin-bottom:20pt;padding:10pt 13pt;border:1pt solid #e5e7eb;background:#f9f9ff;}'+
    '.ho-topic-title{font-weight:bold;font-size:11pt;color:#0f172a;margin:0 0 5pt;padding-bottom:4pt;border-bottom:1pt solid #e5e7eb;}'+
    '.ho-topic-body{font-size:10pt;line-height:1.65;color:#374151;}'+
    '.ho-topic-body p{margin:0 0 5pt;}.ho-topic-body ul{margin:3pt 0 6pt 14pt;}.ho-topic-body li{margin-bottom:3pt;}'+
    '.ho-topic-body table{width:100%;border-collapse:collapse;font-size:9pt;margin:5pt 0 8pt;}'+
    '.ho-topic-body th{background:#eef2ff;padding:4pt 6pt;text-align:left;border:1pt solid #d1d5db;font-size:8.5pt;}'+
    '.ho-topic-body td{padding:3pt 6pt;border:1pt solid #d1d5db;vertical-align:top;}'+
    '.ho-footer{margin-top:20pt;padding-top:10pt;border-top:1pt solid #e5e7eb;font-size:8pt;color:#9ca3af;font-style:italic;}'+
    '</style></head><body>'+html+'</body></html>';
}

function dlDocx(){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected.');return;}
  var name=(f('ptName')||'Patient').replace(/[^a-zA-Z0-9]/g,'_');
  var blob=new Blob(['﻿'+docx],{type:'application/msword;charset=utf-8'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='ANX_Psychoeducation_'+name+'.doc';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  flash($('btn-docx'),'Downloaded!');
}
function copyPlain(btn){
  var pv=$('preview');
  if(!buildHandout()){alert('No topics selected.');return;}
  navigator.clipboard.writeText(pv.innerText||pv.textContent).then(function(){flash(btn,'Copied!');}).catch(function(){});
}
function copyFormatted(btn){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected.');return;}
  if(window.ClipboardItem){
    var blob=new Blob([docx],{type:'text/html'});
    navigator.clipboard.write([new ClipboardItem({'text/html':blob})]).then(function(){flash(btn,'Copied!');}).catch(function(){
      navigator.clipboard.writeText($('preview').innerText||'').then(function(){flash(btn,'Copied (plain)!');});
    });
  } else {
    navigator.clipboard.writeText($('preview').innerText||'').then(function(){flash(btn,'Copied!');});
  }
}
function flash(btn,msg){
  if(!btn)return;
  var orig=btn.textContent;btn.textContent=msg;btn.classList.add('copied');
  setTimeout(function(){btn.textContent=orig;btn.classList.remove('copied');},2000);
}

document.addEventListener('DOMContentLoaded',function(){
  var td=new Date().toISOString().slice(0,10);
  var dtEl=$('ptDate'); if(dtEl&&!dtEl.value) dtEl.value=td;
  renderTopics();
  refresh();
});
</script>
