    {id:'asd_burnout',title:'Autistic burnout',body:'<p><strong>What it is:</strong> A state of chronic exhaustion, reduced function, and withdrawal following prolonged overload, masking, or demand beyond capacity. Often misdiagnosed as depression.</p><p><strong>How it differs from depression:</strong></p><ul><li><em>Burnout:</em> Driven by accumulated overload; temporary drop in skills and function; improvement follows demand reduction and recovery.</li><li><em>Depression:</em> Lowered baseline mood and energy; involves anhedonia (loss of pleasure), negative thinking, hopelessness; requires different treatment.</li></ul><p><strong>Common triggers:</strong> Life transitions (starting university, new job, relationship changes), sustained masking, loss of routine, sensory overload over time, insufficient recovery between demands.</p><p><strong>Recovery strategy:</strong> Reduce demands, restore routine, increase sensory-safe time, protect sleep, reduce social performance requirements. Do not push through with social activation — that makes it worse. Time is the primary healer.</p>'},
    {id:'asd_interoception',title:'Interoception',body:'<p><strong>What it is:</strong> The brain\'s ability to sense internal signals — hunger, thirst, fatigue, pain, anxiety, bladder fullness, temperature. In autism, these signals are often delayed, muted, or difficult to interpret accurately.</p><p><strong>What this looks like:</strong> Not noticing hunger until severely hungry; not realising how tired you are until collapse; missing early anxiety signals until a meltdown; poor pain sensitivity or oversensitivity; difficulty identifying what emotion you are feeling (alexithymia).</p><p><strong>Strategies:</strong></p><ul><li>Use <strong>external monitoring</strong> — alarms for meals, hydration reminders, scheduled toilet breaks, sleep timers.</li><li>Build a <strong>body check routine</strong> — several times a day, stop and systematically check: Am I hungry? Thirsty? Tired? Needing movement?</li><li>Use <strong>visual emotion wheels</strong> to identify feelings when they are difficult to name.</li><li>Track energy levels throughout the day to identify your personal patterns.</li></ul>'},
    {id:'asd_sensory',title:'Sensory processing and the sensory diet',body:'<p><strong>Why it matters:</strong> The autistic nervous system escalates arousal faster and recovers slower. Sensory input regulates the nervous system\'s arousal level — both too much and too little can cause distress.</p><p><strong>Hyper-reactivity</strong> (oversensitive): Loud sounds intolerable, light touch uncomfortable, certain food textures or smells overwhelming, fluorescent lighting distressing.</p><p><strong>Hypo-reactivity</strong> (undersensitive): Seeking intense sensory input, not noticing pain or cold, enjoying very loud music, needing movement to focus.</p><p><strong>Sensory diet strategies:</strong></p><ul><li><strong>Proprioceptive input:</strong> Weighted blankets, compression clothing, heavy work (lifting, pushing, carrying), joint compression exercises.</li><li><strong>Vestibular input:</strong> Walking, swimming, cycling, rocking, indoor steppers — rhythmic movement is regulating.</li><li><strong>Auditory:</strong> Noise-cancelling headphones or earplugs (Loop earplugs — Switch 2 or Dream), background music at steady tempo, white noise.</li><li><strong>Visual:</strong> Reduce fluorescent lighting, use lamps or natural light, sunglasses outdoors.</li><li><strong>Sleep:</strong> Manta Sleep Sound mask; Re-Timer 3 light therapy for circadian rhythm and mood.</li></ul><p><strong>Stimming:</strong> Repetitive movements (rocking, hand movements, fidgeting) are self-regulatory — not something to suppress unless they are causing harm. Suppressing stimming increases internal stress. Safe stimming should be permitted wherever possible.</p>'},
    {id:'asd_exec',title:'Executive function',body:'<p><strong>What it is:</strong> Planning, initiating, organising, prioritising, switching, tracking time, holding information in mind. Difficulties in these areas are common in autism (and especially when ADHD is also present).</p><p><strong>Why "just do it" doesn\'t work:</strong> Tasks are often driven by interest, routine, and urgent deadlines. Without motivation or clear structure, initiation fails — not because of laziness, but because of genuine executive dysfunction.</p><p><strong>Strategies:</strong></p><ul><li><strong>Stepwise task design:</strong> Break tasks into the smallest possible steps and write them out. Reduce the activation cost of starting.</li><li><strong>Hyperfocus windows:</strong> Schedule demanding work for times when you are naturally most focused. Protect these windows.</li><li><strong>Pair tasks with engagement:</strong> Background music, preferred environment, a warm drink — pair aversive tasks with something pleasant.</li><li><strong>Body doubling:</strong> Work alongside someone else — in person, via video call, or using services like Focusmate (free virtual body doubling).</li><li><strong>Visual timers:</strong> Time Timer and similar tools make the passing of time visible and reduce time blindness.</li><li><strong>Written systems:</strong> External checklists, calendars, and whiteboards reduce reliance on working memory.</li></ul>'},
    {id:'asd_social',title:'Relationships and social communication',body:'<p><strong>The core challenge:</strong> Misalignment between autistic and non-autistic communication styles — not an inability to connect, but a different way of connecting that can be misread by both sides.</p><p><strong>What this can look like:</strong> Difficulty with small talk, appearing blunt or uninterested, missing implied meanings or sarcasm, difficulty navigating group dynamics, more comfortable 1:1, friendships that feel one-sided, workplace politics that seem illogical.</p><p><strong>Strategies:</strong></p><ul><li><strong>Explicitly state your communication preferences</strong> to people you trust — "I communicate better in writing," "I need time to process before responding," "I may seem blunt — I don\'t mean to be."</li><li><strong>Explain overload and shutdown behaviours</strong> to close contacts before they happen, not during.</li><li><strong>Be selective with masking energy</strong> — identify where it is genuinely necessary and where it is habitual.</li><li><strong>Quality over quantity:</strong> Deep 1:1 connections are more sustainable than large social networks for most autistic people.</li><li><strong>Romantic relationships:</strong> Look for partners who are curious about your experience, communicate directly, and respect your need for routine and recovery time.</li></ul>'},
    {id:'asd_therapy',title:'Psychotherapy — what works',body:'<p><strong>Key message:</strong> Not all therapies are equal, and not all therapists understand autism. The goal is self-understanding, coping skills, and practical strategies — not changing who you are.</p><p><strong>Approaches with evidence:</strong></p><ul><li><strong>Modified CBT for autism:</strong> Adapted to be concrete, structured, and directly skills-focused. Useful for anxiety, depression, and coping strategies.</li><li><strong>ACT (Acceptance and Commitment Therapy):</strong> Particularly well-suited to autism — focuses on values, flexibility, and reducing experiential avoidance rather than challenging thoughts.</li><li><strong>DBT skills:</strong> Emotion regulation, distress tolerance, mindfulness. Useful for emotional dysregulation and interpersonal difficulties.</li><li><strong>ADHD coaching / autism coaching:</strong> Practical, accountability-focused. Complements therapy.</li><li><strong>OT (Occupational Therapy):</strong> Sensory processing, daily living skills, environmental modifications, executive function supports.</li></ul><p><strong>What to avoid:</strong> Therapists who focus on making you seem neurotypical; ABA-based approaches in adults (designed for children); therapy that pathologises stimming, special interests, or direct communication style without good reason.</p><p><strong>Book suggestions:</strong> <em>NeuroTribes</em> (history and perspective); <em>Uniquely Human</em> (understanding autistic behaviour); <em>The Independent Woman\'s Handbook for Super Safe Living on the Autistic Spectrum</em> (practical strategies).</p>'},
    {id:'asd_faqs',title:'Commonly asked questions',body:'<p><strong>Does the diagnosis change who I am?</strong> No. It explains who you already are. People often describe relief — "it makes sense now" — rather than feeling defined or limited by it.</p><p><strong>Will I always need support?</strong> Autism is lifelong, but support needs change. Many people function well with the right strategies, environment, and understanding. Others need ongoing structured support. It depends on your profile and your life.</p><p><strong>Why wasn\'t I diagnosed as a child?</strong> Many adults were missed — especially women, high-maskers, and those who were academically capable. Understanding of autism has changed enormously, and late diagnosis is very common.</p><p><strong>Does everyone on social media have ASD now?</strong> Awareness has genuinely increased. But increased identification does not mean over-diagnosis — it means people who were previously missed are now being found. A thorough clinical assessment is still meaningful.</p><p><strong>Do I have ADHD too?</strong> ADHD and autism overlap in 50–70% of cases. If you have significant inattention, impulsivity, or time-blindness, it is worth specifically assessing for ADHD.</p><p><strong>My family doesn\'t believe in the diagnosis.</strong> You don\'t need to convince them. "I\'ve had a thorough clinical assessment and I\'m comfortable with the diagnosis." You don\'t owe anyone a debate.</p><p><strong>What if I\'m still not sure?</strong> That is completely normal. A diagnostic assessment is the beginning of self-understanding, not a final verdict. Continue with what is useful.</p>'},
    {id:'asd_cautions',title:'Things to be cautious about',body:'<ul><li><strong>Excessive social media and online autism communities:</strong> While peer connection is valuable, online communities can amplify anxiety, create catastrophic identity narratives, or provide advice that doesn\'t fit your individual profile. Use selectively.</li><li><strong>Substance use:</strong> Cannabis is particularly problematic — it worsens anxiety, disrupts sleep, and impairs the cognitive clarity that good management depends on. Alcohol, while common socially, can worsen sensory sensitivity the next day and disrupt sleep architecture.</li><li><strong>Uncritical acceptance of online advice:</strong> Not everyone offering advice online has your context, your level, or your specific profile. Apply clinical judgement.</li><li><strong>ABA or compliance-based approaches:</strong> These are not recommended for autistic adults. They focus on suppressing autistic behaviours rather than building coping skills and self-understanding.</li><li><strong>Pushing through burnout:</strong> Rest is not weakness. Sustained overload without recovery leads to longer and deeper burnout. Pacing is a clinical skill.</li></ul>'}
  ]},
  {label:'Products and Resources',optional:true,items:[
    {id:'asd_sensory_tools',title:'Sensory tools',body:'<p><strong>Loop Earplugs</strong> — High-quality reusable earplugs. The Switch 2 or Dream models reduce volume without distorting sound — good for work, social, and transit environments. <a href="https://au.loopearplugs.com" target="_blank">au.loopearplugs.com</a></p><p><strong>Neptune Blanket</strong> — Weighted blankets for sleep onset and sensory regulation. Usually 35–36% off. <a href="https://neptuneblanket.com.au" target="_blank">neptuneblanket.com.au</a></p><p><strong>Compression clothing</strong> — Thompson tees for day-to-day use; compression base layers for sensory seeking. Provides proprioceptive input and reduces tactile sensitivity.</p><p><strong>Kaiko Fidgets</strong> — Quality fidget tools useful for managing restlessness, focus, and as substitutes for body-focused repetitive behaviours. <a href="https://kaikofidgets.com" target="_blank">kaikofidgets.com</a></p>'},
    {id:'asd_sleep_tools',title:'Sleep tools',body:'<p><strong>Manta Sleep SOUND mask</strong> — Blackout eye mask with built-in audio. Useful for the autistic brain that struggles to disengage at bedtime. Use code <strong>SLEEPBETTER_15</strong> for 15% off at <a href="https://mantasleep.com.au" target="_blank">mantasleep.com.au</a></p><p><strong>Re-Timer 3</strong> — Light therapy glasses worn for 30–60 minutes each morning. Regulates circadian rhythm, improves mood, and advances delayed sleep phase (common in autism). Use code <strong>BMURRIE</strong> for 20% off at <a href="https://www.retimer.com.au/retimer-3/" target="_blank">retimer.com.au/retimer-3</a></p><p><strong>Music for regulation:</strong> Brain.fm (focus/sleep playlists), trance music at steady tempo (e.g. Anjunadeep), or metronome-based sound for rhythmic regulation during sleep or work.</p>'},
    {id:'asd_focus_tools',title:'Focus and executive function tools',body:'<p><strong>Time Timer</strong> — Visual timer that makes the passage of time visible. Reduces time blindness. Available in multiple sizes at <a href="https://timetimer.com" target="_blank">timetimer.com</a></p><p><strong>Focusmate</strong> — Free virtual body doubling service. Schedule 50-minute co-working sessions with a partner. Remarkably effective for task initiation. <a href="https://focusmate.com" target="_blank">focusmate.com</a></p><p><strong>Melodic Forest</strong> — Kalimba and tongue drums. The kalimba is an excellent phone replacement — stimulating enough to satisfy the urge to pick something up, and genuinely calming. <a href="https://www.melodicforest.com.au" target="_blank">melodicforest.com.au</a></p>'},
    {id:'asd_books',title:'Recommended books',body:'<p><strong>NeuroTribes</strong> — Steve Silberman. The definitive history of autism. Essential for understanding the cultural and scientific context of the diagnosis.</p><p><strong>Uniquely Human</strong> — Barry Prizant. Reframes autistic behaviour as meaningful communication rather than deficits. Compassionate and evidence-informed.</p><p><strong>The Independent Woman\'s Handbook for Super Safe Living on the Autistic Spectrum</strong> — Robyn Steward. Practical, real-world strategies for autistic women navigating adult life safely.</p><p><strong>I Think I Might Be Autistic</strong> — Cynthia Kim. A practical guide for late-diagnosed adults working out what the diagnosis means for their life.</p><p><strong>The Autistic Brain</strong> — Temple Grandin. Personal account combined with neuroscience — useful for understanding sensory and cognitive differences.</p>'}
  ]},
  {label:'Additional Topics',optional:true,items:[
    {id:'asd_workplace',title:'Workplace accommodations and disclosure',body:'<p><strong>Disclosure:</strong> Not legally required. Consider whether the specific accommodation you need requires disclosure. Stigma remains real — proceed thoughtfully and selectively.</p><p><strong>Useful adjustments:</strong> Written instructions and meeting agendas in advance, permission to use headphones, flexible start times, reduced open-plan exposure, clear and explicit feedback, predictable routines, working from home where possible.</p><p><strong>Under the Disability Discrimination Act (Australia):</strong> Employers are required to make reasonable adjustments. You do not need a diagnosis to request adjustments, but having one strengthens your position if needed.</p><p><strong>If self-employed:</strong> Batch admin into one weekly block, automate invoicing, fixed daily start routine, external accountability via coach or colleague.</p>'},
    {id:'asd_ndis',title:'NDIS access',body:'<p><strong>Eligibility:</strong> ASD is a listed condition under the NDIS. You need evidence that your disability causes substantial functional impairment and the impairment is likely permanent.</p><p><strong>What the NDIS can fund:</strong> Support coordination, occupational therapy, speech pathology, psychology, social skills groups, daily life supports, assistive technology, community access, and more.</p><p><strong>Evidence needed:</strong> Diagnostic report (including severity levels), functional assessment from OT or psychologist, supporting letters from treating clinicians. The diagnostic level matters — Level 1 applications often require detailed functional evidence.</p><p><strong>Process:</strong> Apply via the NDIS Access Request Form. If declined, you can request an internal review. Supports are available through the NDIA, LAC (Local Area Coordinator), and community partners.</p>'},
    {id:'asd_sleep',title:'Sleep difficulties',body:'<p><strong>Why sleep and autism intersect:</strong> Delayed sleep phase is more common in autism; sensory sensitivity makes sleep environment critical; difficulty disengaging the mind at bedtime; co-occurring anxiety and ADHD worsen sleep further; irregular melatonin secretion documented in autism research.</p><p><strong>What helps:</strong></p><ul><li>Consistent wake time (including weekends) — the single most powerful sleep intervention.</li><li>Morning bright light therapy (Re-Timer 3 — 30–60 mins on waking) to advance sleep timing.</li><li>Sensory-safe sleep environment: blackout (Manta Sleep mask), comfortable temperature, white noise or music if helpful.</li><li>Wind-down routine that starts 60–90 minutes before bed. Predictable and repeatable.</li><li>Avoid screens in the 60 minutes before sleep.</li><li>Melatonin (low dose, short-acting) can help with sleep onset — discuss with your psychiatrist.</li><li>Clonidine is sometimes used off-label for sleep in autism — discuss if insomnia is significantly impairing.</li></ul>'},
    {id:'asd_emreg',title:'Emotional regulation',body:'<p><strong>Why emotions can be intense:</strong> Many autistic people experience emotions with greater intensity and have fewer automatic regulatory resources. Interoception difficulties mean early signals are missed. Masking suppresses emotional expression, which increases internal pressure. Alexithymia (difficulty identifying emotions) is common — making it hard to name and respond to feelings early.</p><p><strong>In the moment (when already activated):</strong></p><ul><li><strong>Cold water:</strong> Submerge face in cold water for 15–30 seconds. Activates the mammalian dive reflex and rapidly reduces emotional arousal.</li><li><strong>Intense exercise:</strong> 60 seconds of jumping jacks or similar — burns physiological activation quickly.</li><li><strong>Paced breathing:</strong> Exhale longer than inhale (4 in, 6–7 out). Activates parasympathetic response.</li><li><strong>Remove the trigger environment:</strong> If possible, physically leave. Escalation does not always respond to talking.</li></ul><p><strong>Longer-term regulation:</strong></p><ul><li><strong>Predictable routines:</strong> Reduce the number of unexpected demands that deplete regulatory capacity.</li><li><strong>Emotion naming:</strong> Accurately labelling feelings activates the prefrontal cortex and reduces amygdala reactivity.</li><li><strong>Scheduled decompression:</strong> Build in daily quiet time after high-demand periods — not as a reward, but as a physiological requirement.</li><li><strong>Opposite Action (DBT):</strong> When the emotion is urging an action that makes things worse, do the opposite — gently and compassionately.</li></ul>'}
  ]}
]

var showADHD = true;
var showASD  = false;
var adhdSel = {};
var asdSel  = {};

function $(id){return document.getElementById(id);}
function f(id){var el=$(id);return el?el.value.trim():'';}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Condition selector ──
function toggleCondition(cond){
  if(cond==='adhd') showADHD=!showADHD;
  if(cond==='asd')  showASD=!showASD;
  $('dis-adhd').className='dis-btn'+(showADHD?' active-adhd':'');
  $('dis-asd').className='dis-btn'+(showASD?' active-asd':'');
  $('block-adhd').style.display=showADHD?'':'none';
  $('block-asd').style.display=showASD?'':'none';
  refresh();
}

// ── Render topic lists ──
function renderTopics(){
  renderTopicList('adhd-topic-list', ADHD_PE_GROUPS, adhdSel, 'adhd');
  renderTopicList('asd-topic-list',  ASD_PE_GROUPS,  asdSel,  'asd');
}

function renderTopicList(containerId, groups, sel, condKey){
  var el=$(containerId); if(!el) return;
  var html='';
  groups.forEach(function(g){
    if(g.label) html+='<div class="pe-group-label">'+(g.optional?'<span style="font-size:9px;opacity:.6;font-weight:600;margin-right:4px">OPTIONAL</span>':'')+esc(g.label)+'</div>';
    g.items.forEach(function(item){
      var done=!!sel[item.id];
      html+='<div class="pe-section'+(done?' '+(condKey+'-done'):'')+(g.optional?' pe-optional':'')+'" data-id="'+item.id+'" data-cond="'+condKey+'">';
      html+='<div class="pe-header">';
      html+='<span class="pe-tick-btn">'+(done?'&#9745;':'&#9744;')+'</span>';
      html+='<span class="pe-title">'+esc(item.title)+'</span>';
      html+='<span class="pe-arrow">&#9658;</span>';
      html+='</div>';
      html+='<div class="pe-body">'+item.body+'</div>';
      html+='</div>';
    });
  });
  el.innerHTML=html;
  el.addEventListener('click',function(e){
    var sec=e.target.closest('[data-id]'); if(!sec) return;
    var id=sec.getAttribute('data-id'), cond=sec.getAttribute('data-cond');
    var isTick=e.target.classList.contains('pe-tick-btn');
    if(isTick){
      e.stopPropagation();
      var selObj=cond==='adhd'?adhdSel:asdSel;
      selObj[id]=!selObj[id];
      sec.classList.toggle(cond+'-done',!!selObj[id]);
      sec.querySelector('.pe-tick-btn').innerHTML=selObj[id]?'&#9745;':'&#9744;';
      refresh();
    } else {
      var hdr=e.target.closest('.pe-header'); if(hdr) sec.classList.toggle('pe-open');
    }
  });
}

function selectAll(cond){
  var groups=cond==='adhd'?ADHD_PE_GROUPS:ASD_PE_GROUPS;
  var sel=cond==='adhd'?adhdSel:asdSel;
  groups.forEach(function(g){g.items.forEach(function(item){sel[item.id]=true;});});
  renderTopics(); refresh();
}
function clearAll(cond){
  var cond2=cond==='adhd'?adhdSel:asdSel;
  Object.keys(cond2).forEach(function(k){cond2[k]=false;});
  renderTopics(); refresh();
}

// ── Build handout HTML ──
function buildHandout(){
  var name=f('ptName')||'Patient';
  var dr=f('drName')||'Your clinician';
  var dv=f('ptDate'),ds=dv?new Date(dv+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):'';

  var adhdItems=getSelectedItems(ADHD_PE_GROUPS,adhdSel);
  var asdItems =getSelectedItems(ASD_PE_GROUPS, asdSel);

  var hasContent=(showADHD&&adhdItems.length)||(showASD&&asdItems.length);
  if(!hasContent) return null;

  var h='';
  // Header
  h+='<div class="ho-header">';
  h+='<div class="ho-pt">Neurodevelopmental Psychoeducation Handout</div>';
  h+='<div class="ho-meta">Patient: <strong>'+esc(name)+'</strong>';
  if(ds) h+=' &nbsp;|&nbsp; '+esc(ds);
  h+=' &nbsp;|&nbsp; Clinician: <strong>'+esc(dr)+'</strong></div>';
  h+='<div class="ho-notice">The following information was discussed or provided as educational material during your appointment. It is a reference guide only — all treatment decisions should be made in consultation with your treating clinician.</div>';
  h+='</div>';

  // ADHD section
  if(showADHD && adhdItems.length){
    h+='<div class="ho-condition-title adhd-t">Attention Deficit Hyperactivity Disorder (ADHD)</div>';
    h+=buildConditionContent(adhdItems, ADHD_PE_GROUPS, 'adhd');
  }

  // ASD section
  if(showASD && asdItems.length){
    h+='<div class="ho-condition-title asd-t">Autism Spectrum Disorder (ASD)</div>';
    h+=buildConditionContent(asdItems, ASD_PE_GROUPS, 'asd');
  }

  // Footer
  h+='<div class="ho-footer">This handout was prepared specifically for '+esc(name)+(ds?' following a psychiatric assessment on '+esc(ds):'')+'. It is not a substitute for clinical advice.</div>';
  return h;
}

function getSelectedItems(groups, sel){
  var result=[];
  groups.forEach(function(g){
    g.items.forEach(function(item){
      if(sel[item.id]) result.push({group:g.label, item:item});
    });
  });
  return result;
}

var ADHD_GROUP_COLORS={
  'null':'adhd-g-general',
  'Medication Information':'adhd-g',
  'Non-pharmacological Strategies':'adhd-g-nonpharm',
  'Products and Resources':'adhd-g-products',
  'Communication':'adhd-g-comm'
};

function buildConditionContent(selectedItems, groups, condKey){
  // Group items by their group label (preserving order from groups)
  var groupMap={}, groupOrder=[];
  groups.forEach(function(g){
    var gKey=g.label||'null';
    g.items.forEach(function(item){
      var found=selectedItems.find(function(s){return s.item.id===item.id;});
      if(found){
        if(!groupMap[gKey]){groupMap[gKey]=[];groupOrder.push({key:gKey,label:g.label});}
        groupMap[gKey].push(item);
      }
    });
  });

  var h='';
  groupOrder.forEach(function(gInfo){
    var gKey=gInfo.key, gLabel=gInfo.label;
    if(gLabel){
      var cls=condKey==='adhd'?(ADHD_GROUP_COLORS[gLabel]||'adhd-g'):'asd-g';
      h+='<div class="ho-group-label '+cls+'">'+esc(gLabel)+'</div>';
    }
    groupMap[gKey].forEach(function(item){
      h+='<div class="ho-topic">';
      h+='<div class="ho-topic-title">'+esc(item.title)+'</div>';
      h+='<div class="ho-topic-body">'+item.body+'</div>';
      h+='</div>';
    });
  });
  return h;
}

// ── Refresh preview ──
function refresh(){
  var html=buildHandout();
  var pv=$('preview');
  if(!html){pv.innerHTML='<div class="empty-msg">Select a condition and tick topics above to generate the handout.</div>';return;}
  pv.innerHTML=html;
}

// ── Export functions ──

  return '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'+
    '<head><meta charset="UTF-8"><style>'+
    '@page{margin:2cm 2.5cm;}'+
    'body{font-family:Arial,sans-serif;font-size:11pt;line-height:1.5;color:#111;}'+

    '.ho-pt{font-size:17pt;font-weight:bold;color:#0f172a;margin-bottom:3pt;}'+
    '.ho-meta{font-size:9pt;color:#6b7280;margin-bottom:10pt;}'+
    '.ho-notice{font-size:9.5pt;background:#f0f9ff;border-left:3pt solid #0e7490;padding:8pt 10pt;color:#0c4a6e;}'+
    '.ho-condition-title{font-size:14pt;font-weight:bold;padding:7pt 10pt;border-radius:5pt;margin:18pt 0 9pt;color:#fff;}'+
    '.ho-condition-title.adhd-t{background:#1e3a5f;}'+

    '.ho-group-label{font-size:8.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;margin:11pt 0 5pt;padding-bottom:2pt;border-bottom:1.5pt solid currentColor;}'+
    '.ho-group-label.adhd-g-general{color:#1e3a5f;}'+
    '.ho-group-label.adhd-g{color:#0e7490;}'+
    '.ho-group-label.adhd-g-nonpharm{color:#7c3aed;}'+
    '.ho-group-label.adhd-g-products{color:#065f46;}'+
    '.ho-group-label.adhd-g-comm{color:#0369a1;}'+
    '.ho-group-label.asd-g{color:#0d9488;}'+
    '.ho-topic{margin-bottom:7pt;padding:8pt 11pt;border:1pt solid #e5e7eb;border-radius:5pt;background:#fafbff;}'+
    '.ho-topic-title{font-weight:bold;font-size:11pt;color:#0f172a;margin:0 0 5pt;padding-bottom:4pt;border-bottom:1pt solid #e5e7eb;}'+

    '.ho-topic-body td{padding:3pt 6pt;border:1pt solid #d1d5db;vertical-align:top;}'+
    '.ho-footer{margin-top:20pt;padding-top:10pt;border-top:1pt solid #e5e7eb;font-size:8pt;color:#9ca3af;font-style:italic;}'+
    '</style></head><body>'+html+'</body></html>';
}

function dlDocx(){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected — please tick some topics first.');return;}
  var name=(f('ptName')||'Patient').replace(/[^a-zA-Z0-9]/g,'_');
  var blob=new Blob(['﻿'+docx],{type:'application/msword;charset=utf-8'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='Psychoeducation_Handout_'+name+'.doc';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  flash($('btn-docx'),'Downloaded!');
}

function copyPlain(btn){
  var pv=$('preview');
  if(!buildHandout()){alert('No topics selected — please tick some topics first.');return;}
  navigator.clipboard.writeText(pv.innerText||pv.textContent).then(function(){flash(btn,'Copied!');}).catch(function(){});
}

function copyFormatted(btn){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected — please tick some topics first.');return;}
  if(window.ClipboardItem){
    var blob=new Blob([docx],{type:'text/html'});
    navigator.clipboard.write([new ClipboardItem({'text/html':blob})]).then(function(){flash(btn,'Copied!');}).catch(function(){
      var pv=$('preview');
      navigator.clipboard.writeText(pv.innerText||pv.textContent).then(function(){flash(btn,'Copied (plain)!');});
    });
  } else {
    var pv=$('preview');
    navigator.clipboard.writeText(pv.innerText||pv.textContent).then(function(){flash(btn,'Copied!');});
  }
}

function flash(btn,msg){
  if(!btn)return;
  var orig=btn.textContent;
  btn.textContent=msg;btn.classList.add('copied');
  setTimeout(function(){btn.textContent=orig;btn.classList.remove('copied');},2000);
}

// ── Init ──
document.addEventListener('DOMContentLoaded',function(){
  // Set today's date
  var td=new Date().toISOString().slice(0,10);
  var dtEl=$('ptDate'); if(dtEl&&!dtEl.value) dtEl.value=td;
  toggleCondition('adhd'); // start with ADHD on
  renderTopics();
  refresh();
});
</script>
</body>
