<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Titration Builder by Dr Benjamin Murrie</title>
<style>
  :root{
    --bg:#f6f7fb;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;
    --primary:#1e3a5f;
    --primary-bg:#e7eef9;
    --green:#16a34a;
    --green-bg:#dcfce7;
    --amber:#f59e0b;
    --amber-bg:#fef3c7;
    --red:#dc2626;
    --red-bg:#fee2e2;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --r:10px;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 4px 12px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.45}
  body{padding-bottom:80px}

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  header{background:#0f172a;color:#e2e8f0;padding:14px 20px;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:20}
  .header-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;max-width:1400px;margin:0 auto}
  header h1{margin:0;font-size:16px;font-weight:700;letter-spacing:.01em;color:#f1f5f9}
  header h1 .sub{display:block;font:500 11px var(--sans);color:#94a3b8;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
  .top-fields{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
  .top-fields input,.top-fields select{background:#1e293b;border:1px solid #334155;color:#f1f5f9;padding:6px 10px;border-radius:7px;font:600 12px var(--sans);min-width:130px}
  .top-fields input:focus,.top-fields select:focus{outline:none;border-color:#64748b}
  .top-fields input::placeholder{color:#64748b}
  .reset-btn{background:#450a0a;border:1.5px solid #dc2626;color:#fca5a5;font:700 11px var(--sans);padding:5px 11px;border-radius:999px;cursor:pointer}
  .reset-btn:hover{background:#7f1d1d}

  /* ── LAYOUT ─────────────────────────────────────────────────────────── */
  main{max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:minmax(340px,1fr) minmax(420px,1.4fr);gap:20px;align-items:start}
  @media (max-width:980px){main{grid-template-columns:1fr}}

  /* ── CARDS ──────────────────────────────────────────────────────────── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .card-head{padding:12px 16px;border-bottom:1px solid var(--border);font:700 13px var(--sans);color:var(--primary);background:linear-gradient(180deg,#fafbff 0%,#f4f6fb 100%);display:flex;align-items:center;gap:8px}
  .card-body{padding:14px 16px}

  /* ── MED PICKER ─────────────────────────────────────────────────────── */
  .picker-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .picker-row select,.picker-row input{flex:1;min-width:160px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font:14px var(--sans);background:#fff}
  .picker-row select:focus,.picker-row input:focus{outline:none;border-color:var(--primary)}
  .btn{padding:8px 14px;border-radius:7px;border:1.5px solid var(--primary);background:var(--primary);color:#fff;font:700 12px var(--sans);cursor:pointer;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
  .btn:hover{background:#274b78;border-color:#274b78}
  .btn.ghost{background:#fff;color:var(--primary)}
  .btn.ghost:hover{background:var(--primary-bg)}
  .btn.danger{background:#fff;border-color:var(--red);color:var(--red)}
  .btn.danger:hover{background:var(--red-bg)}
  .btn.sm{padding:5px 9px;font-size:11px}

  .med-list{display:flex;flex-direction:column;gap:10px}
  .med-card{border:1px solid var(--border);border-radius:8px;background:#fafbff;padding:10px 12px}
  .med-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .med-name{font:700 14px var(--sans);color:var(--primary)}
  .med-generic{font:400 12px var(--sans);color:var(--muted);margin-left:6px}
  .med-class-pill{display:inline-block;padding:2px 8px;border-radius:999px;font:700 10px var(--sans);text-transform:uppercase;letter-spacing:.06em;margin-left:6px}
  .med-class-pill.stimulant{background:var(--amber-bg);color:#b45309}
  .med-class-pill.nonstim{background:#dbeafe;color:#1e40af}
  .med-class-pill.other{background:#f1f5f9;color:#475569}

  .auth-line{font:400 11.5px/1.4 var(--sans);color:#475569;background:#fff7ed;border:1px solid #fde68a;padding:6px 10px;border-radius:6px;margin:6px 0}

  /* Step list */
  .step-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12.5px}
  .step-table thead th{background:#f1f5f9;color:#475569;font:700 10px var(--sans);text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
  .step-table tbody td{padding:6px 8px;border-bottom:1px solid #eef2f7;vertical-align:top}
  .step-table tbody tr:last-child td{border-bottom:none}
  .step-table input,.step-table textarea{width:100%;border:1px solid transparent;background:transparent;font:13px var(--sans);padding:3px 4px;border-radius:4px;resize:none}
  .step-table input:hover,.step-table textarea:hover{background:#fff;border-color:#e2e8f0}
  .step-table input:focus,.step-table textarea:focus{outline:none;background:#fff;border-color:var(--primary)}
  .step-table textarea{min-height:24px;line-height:1.4}
  .step-actions{display:flex;gap:4px;justify-content:flex-end}
  .icon-btn{background:transparent;border:1px solid var(--border);border-radius:5px;width:24px;height:24px;cursor:pointer;color:var(--muted);font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0}
  .icon-btn:hover{background:#fff;color:var(--text);border-color:var(--muted)}
  .icon-btn.danger:hover{color:var(--red);border-color:var(--red)}
  .step-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .step-foot .left{display:flex;gap:6px;flex-wrap:wrap}

  /* Script controls */
  .script-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px;padding:8px 10px;background:#fff;border:1px solid var(--border);border-radius:7px}
  .script-controls label{font:600 10px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:3px}
  .script-controls input,.script-controls select{width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 7px;font:13px var(--sans);background:#fafbfc}
  .script-controls input:focus,.script-controls select:focus{outline:none;border-color:var(--primary);background:#fff}

  /* ── OUTPUT TABS ────────────────────────────────────────────────────── */
  .out-tabs{display:flex;gap:2px;background:#0f172a;padding:6px 6px 0 6px;border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid #1e293b}
  .out-tab{padding:8px 14px;border:none;background:transparent;color:#94a3b8;font:700 12px var(--sans);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;border-radius:6px 6px 0 0}
  .out-tab:hover{color:#cbd5e1}
  .out-tab.active{background:#fafbff;color:var(--primary)}

  .out-body{background:#fafbff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
  .out-pane{display:none;padding:16px 18px;min-height:300px}
  .out-pane.active{display:block}
  .out-actions{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}

  /* eScript styling */
  .escript{font:13px/1.55 var(--mono);background:#fff;border:1px solid var(--border);border-radius:7px;padding:14px 16px;white-space:pre-wrap;color:#1e293b}

  /* Letter styling */
  .letter{font:14px/1.6 'Georgia','Times New Roman',serif;background:#fff;border:1px solid var(--border);border-radius:7px;padding:18px 22px;color:#1f2937}
  .letter p{margin:0 0 10px 0}

  /* Table output */
  .out-pane .schedule{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .schedule thead th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;font:700 11px var(--sans);text-transform:uppercase;letter-spacing:.04em}
  .schedule tbody td{padding:9px 10px;border-bottom:1px solid #eef2f7;vertical-align:top}
  .schedule tbody tr:last-child td{border-bottom:none}
  .schedule tbody tr:nth-child(even){background:#fafbff}

  /* Empty */
  .empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;background:#fafbff;border:1px dashed var(--border);border-radius:8px}

  /* Print */
  @media print{
    header,.out-tabs,.out-actions,.btn,.icon-btn,.reset-btn,.top-fields{display:none !important}
    main{display:block;padding:0}
    .card{box-shadow:none;border:none}
    .out-pane{display:block !important;padding:0;page-break-inside:avoid}
  }
  /* Visually hidden */
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  /* Footer */
  footer{max-width:1400px;margin:0 auto;padding:14px 20px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>Titration Builder<span class="sub">by Dr Benjamin Murrie</span></h1>
    <div class="top-fields">
      <input id="patientName" type="text" placeholder="Patient name" autocomplete="off">
      <input id="patientDob" type="date" aria-label="Patient DOB">
      <input id="clinician" type="text" placeholder="Clinician" autocomplete="off">
      <input id="visitDate" type="date" aria-label="Visit date">
      <button class="reset-btn" onclick="resetAll()" title="Reset everything">Reset</button>
    </div>
  </div>
</header>

<main>
  <!-- ───────────── LEFT: BUILDER ───────────── -->
  <section>
    <div class="card">
      <div class="card-head">Add medication</div>
      <div class="card-body">
        <div class="picker-row">
          <select id="medClassFilter">
            <option value="all">All classes</option>
            <option value="stimulant">Stimulants</option>
            <option value="nonstim">Non-stimulants</option>
            <option value="other">Other</option>
          </select>
          <select id="medPicker">
            <option value="">Choose a medication…</option>
          </select>
          <button class="btn" onclick="addSelectedMed()">Add</button>
        </div>
        <div id="medList" class="med-list"></div>
        <div id="medEmpty" class="empty" style="margin-top:6px">No medications yet — pick one above to begin.</div>
      </div>
    </div>
  </section>

  <!-- ───────────── RIGHT: OUTPUTS ───────────── -->
  <section>
    <div class="card">
      <div class="out-tabs">
        <button class="out-tab active" data-tab="escript" onclick="setTab('escript')">eScript</button>
        <button class="out-tab" data-tab="letter" onclick="setTab('letter')">Letter prose</button>
        <button class="out-tab" data-tab="table" onclick="setTab('table')">Table</button>
      </div>
      <div class="out-body">
        <div class="out-actions">
          <button class="btn sm ghost" onclick="copyActive()">Copy</button>
          <button class="btn sm ghost" onclick="printActive()">Print / PDF</button>
        </div>
        <div id="out-escript" class="out-pane active"></div>
        <div id="out-letter" class="out-pane"></div>
        <div id="out-table" class="out-pane"></div>
      </div>
    </div>
  </section>
</main>

<footer>Titration Builder · Use alongside clinical judgement. Confirm doses, authority requirements and state-specific rules before issuing any prescription.</footer>

<script>
'use strict';

/* ───────────────────────── MED CATALOGUE ─────────────────────────────────
   Each med:
   - name        : display name
   - generic     : printed generic name for scripts
   - class       : 'stimulant' | 'nonstim' | 'other'
   - schedule    : 'S8' | 'S4' | etc.
   - form        : 'tablet' | 'capsule' | 'tablet (IR)' etc.
   - strengths   : array of available strengths (numbers)
   - unit        : 'mg' | 'mcg'
   - authority   : default authority / prescribing footnote
   - mitte       : default total quantity (string)
   - repeats     : default repeats (number)
   - intervalRule: 20-day for S8 stimulants etc.
   - steps       : default titration steps
       label  : 'Days 1–7' / 'Week 1' etc.
       dur    : duration string e.g. '7 days', 'ongoing'
       sig    : sig text e.g. '½ tab BD'  (the dose+frequency)
       totalDose: optional total daily dose string e.g. '5 mg'
       notes  : any specific instructions
   New medications can be added by inserting another entry — no other code
   needs to change.
─────────────────────────────────────────────────────────────────────────── */
const MED_CATALOG = {
  dex_ir: {

      {label:'Ongoing',   dur:'ongoing', sig:'2 tabs (10 mg) on waking and at midday', totalDose:'20 mg/day', notes:'Continue at this dose until next review.'}
    ]
  },
  ritalin_ir: {
    name:'Ritalin IR',
    generic:'Methylphenidate hydrochloride',
    class:'stimulant', schedule:'S8',
    form:'tablet', strengths:[10], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). 20-day prescription interval.',
    mitte:'100 tablets', repeats:5, intervalRule:'20-day',
    steps:[
      {label:'Days 1–2',  dur:'2 days',  sig:'½ tab (5 mg) on waking and at midday',  totalDose:'10 mg/day',  notes:'Start low.'},
      {label:'Days 3–9',  dur:'7 days',  sig:'1 tab (10 mg) on waking and at midday', totalDose:'20 mg/day',  notes:''},
      {label:'Days 10–16',dur:'7 days',  sig:'2 tabs (20 mg) on waking, 1 tab (10 mg) at midday', totalDose:'30 mg/day', notes:''},
      {label:'Ongoing',   dur:'ongoing', sig:'2 tabs (20 mg) on waking and at midday',totalDose:'40 mg/day',  notes:''}
    ]
  },
  ritalin_la: {
    name:'Ritalin LA',
    generic:'Methylphenidate (modified-release)',
    class:'stimulant', schedule:'S8',
    form:'capsule', strengths:[10,20,30,40,60], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). Once daily. Capsule can be sprinkled on soft food.',
    mitte:'30 capsules', repeats:5, intervalRule:'20-day',
    steps:[
      {label:'Week 1',     dur:'7 days', sig:'10 mg cap each morning',  totalDose:'10 mg/day', notes:'Sprinkle on soft food if needed.'},
      {label:'Weeks 2–3',  dur:'14 days',sig:'20 mg cap each morning',  totalDose:'20 mg/day', notes:''},
      {label:'Weeks 4–5',  dur:'14 days',sig:'30 mg cap each morning',  totalDose:'30 mg/day', notes:''},
      {label:'Ongoing',    dur:'ongoing',sig:'40 mg cap each morning',  totalDose:'40 mg/day', notes:'Review at next appointment.'}
    ]
  },
  concerta: {
    name:'Concerta',
    generic:'Methylphenidate OROS',
    class:'stimulant', schedule:'S8',
    form:'tablet', strengths:[18,27,36,54], unit:'mg',
    authority:'S8 stimulant authority required. PBS Authority — diagnosis must have been made before age 18. Add CA2023 (NSW). Swallow whole — do NOT crush.',
    mitte:'30 tablets', repeats:5, intervalRule:'20-day',
    steps:[
      {label:'Week 1',    dur:'7 days', sig:'18 mg tab each morning', totalDose:'18 mg/day', notes:'Swallow whole — must not be crushed.'},
      {label:'Weeks 2–3', dur:'14 days',sig:'27 mg tab each morning', totalDose:'27 mg/day', notes:''},
      {label:'Weeks 4–5', dur:'14 days',sig:'36 mg tab each morning', totalDose:'36 mg/day', notes:''},
      {label:'Ongoing',   dur:'ongoing',sig:'54 mg tab each morning', totalDose:'54 mg/day', notes:'Maximum daily dose.'}
    ]
  },
  vyvanse: {
    name:'Vyvanse',
    generic:'Lisdexamfetamine dimesilate',
    class:'stimulant', schedule:'S8',
    form:'capsule', strengths:[20,30,40,50,60,70], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). Take on waking. Capsule can be opened and dissolved in water.',
    mitte:'30 capsules', repeats:5, intervalRule:'20-day',
    steps:[
      {label:'Week 1',     dur:'7 days', sig:'30 mg cap each morning', totalDose:'30 mg/day', notes:'On waking.'},
      {label:'Weeks 2–3',  dur:'14 days',sig:'30 mg cap + 20 mg cap each morning', totalDose:'50 mg/day', notes:''},
      {label:'Ongoing',    dur:'ongoing',sig:'30 mg cap + 2 × 20 mg cap each morning', totalDose:'70 mg/day', notes:'Only if still symptomatic. Confirm tolerability.'}
    ]
  },
  atomoxetine: {
    name:'Atomoxetine (Strattera)',
    generic:'Atomoxetine hydrochloride',
    class:'nonstim', schedule:'S4',
    form:'capsule', strengths:[10,18,25,40,60,80,100], unit:'mg',
    authority:'PBS Streamlined Authority code 7876 (initiation) / 7890 (continuation). Not a controlled substance. Full effect at 4–12 weeks.',
    mitte:'28 capsules', repeats:5, intervalRule:'',
    steps:[
      {label:'Weeks 1–4', dur:'28 days', sig:'40 mg cap each morning', totalDose:'40 mg/day', notes:'Take with food to reduce nausea.'},
      {label:'Weeks 5–8', dur:'28 days', sig:'60 mg cap each morning', totalDose:'60 mg/day', notes:'Increase if tolerating.'},
      {label:'Weeks 9–12',dur:'28 days', sig:'80 mg cap each morning', totalDose:'80 mg/day', notes:'Target dose for most adults.'},
      {label:'Ongoing',   dur:'ongoing', sig:'80 mg cap each morning', totalDose:'80 mg/day', notes:'Do not exceed without review.'}
    ]
  },
  guanfacine_xr: {
    name:'Guanfacine XR (Intuniv)',
    generic:'Guanfacine hydrochloride (extended release)',
    class:'nonstim', schedule:'S4',
    form:'tablet', strengths:[1,2,3,4], unit:'mg',
    authority:'Private prescription unless PBS criteria met (childhood diagnosis). Not a controlled substance. Do not crush or chew. Taper if ceasing.',
    mitte:'28 tablets', repeats:5, intervalRule:'',
    steps:[
      {label:'Week 1',    dur:'7 days', sig:'1 mg tab at night',    totalDose:'1 mg/day', notes:'Take in the evening. Avoid high-fat meals at dose time.'},
      {label:'Week 2',    dur:'7 days', sig:'2 mg tab at night',    totalDose:'2 mg/day', notes:'Monitor BP and pulse.'},
      {label:'Week 3',    dur:'7 days', sig:'3 mg tab at night',    totalDose:'3 mg/day', notes:''},
      {label:'Ongoing',   dur:'ongoing',sig:'4 mg tab at night',    totalDose:'4 mg/day', notes:'Target maintenance dose. Adjust to lowest effective dose.'}
    ]
  },
  clonidine: {
    name:'Clonidine (Catapres)',
    generic:'Clonidine hydrochloride',
    class:'nonstim', schedule:'S4',
    form:'tablet', strengths:[100,150], unit:'mcg',
    authority:'Private prescription. Off-label use for ADHD-related hyperarousal and sleep. Taper if ceasing — do NOT stop abruptly (rebound hypertension).',
    mitte:'100 tablets', repeats:5, intervalRule:'',
    steps:[
      {label:'Week 1',  dur:'7 days', sig:'½ tab (50 mcg) at night',          totalDose:'50 mcg/day',  notes:'Start at night. Warn re sedation and dizziness on standing.'},
      {label:'Week 2',  dur:'7 days', sig:'1 tab (100 mcg) at night',         totalDose:'100 mcg/day', notes:'Recheck BP and pulse.'},
      {label:'Week 3',  dur:'7 days', sig:'1 tab (100 mcg) BD',               totalDose:'200 mcg/day', notes:''},
      {label:'Ongoing', dur:'ongoing',sig:'1½ tabs (150 mcg) BD',             totalDose:'300 mcg/day', notes:'Titrate to lowest effective dose.'}
    ]
  }
};

/* ─────────────────────────── STATE ─────────────────────────────────────── */
const S = {
  patientName:'',
  patientDob:'',
  clinician:'',
  visitDate:'',
  meds:[]   // array of {key, customName, mitte, repeats, authority, steps:[{label,dur,sig,totalDose,notes}]}
};
const STORAGE_KEY='titration_builder_v1';
let activeTab='escript';

/* ────────────────────────── PERSISTENCE ────────────────────────────────── */
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}catch(e){}}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const o=JSON.parse(raw);
    Object.assign(S,o);
    if(!Array.isArray(S.meds))S.meds=[];
  }catch(e){}
}

/* ────────────────────────── HELPERS ────────────────────────────────────── */
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function clone(o){return JSON.parse(JSON.stringify(o));}

/* ────────────────────── PICKER POPULATION ─────────────────────────────── */
function populatePicker(){
  const cls=$('medClassFilter').value;
  const picker=$('medPicker');
  picker.innerHTML='<option value="">Choose a medication…</option>';
  Object.entries(MED_CATALOG).forEach(([key,m])=>{
    if(cls!=='all'&&m.class!==cls)return;
    const opt=document.createElement('option');
    opt.value=key;opt.textContent=m.name;
    picker.appendChild(opt);
  });
}

/* ─────────────────────── ADD / REMOVE MEDS ────────────────────────────── */
function addSelectedMed(){
  const key=$('medPicker').value;
  if(!key||!MED_CATALOG[key])return;
  const def=MED_CATALOG[key];
  S.meds.push({
    key:key,
    customName:def.name,
    generic:def.generic,
    class:def.class,
    schedule:def.schedule,
    form:def.form,
    unit:def.unit,
    authority:def.authority,
    mitte:def.mitte,
    repeats:def.repeats,
    intervalRule:def.intervalRule||'',
    steps:clone(def.steps)
  });
  $('medPicker').value='';
  save();render();
}
function removeMed(idx){
  if(!confirm('Remove this medication and its titration plan?'))return;
  S.meds.splice(idx,1);save();render();
}
function moveStep(midx,sidx,dir){
  const arr=S.meds[midx].steps;
  const ni=sidx+dir;if(ni<0||ni>=arr.length)return;
  const tmp=arr[sidx];arr[sidx]=arr[ni];arr[ni]=tmp;
  save();render();
}
function addStep(midx){
  S.meds[midx].steps.push({label:'New step',dur:'7 days',sig:'',totalDose:'',notes:''});
  save();render();
}
function removeStep(midx,sidx){
  if(S.meds[midx].steps.length<=1){alert('Each medication needs at least one step.');return;}
  S.meds[midx].steps.splice(sidx,1);save();render();
}
function setStepField(midx,sidx,field,val){
  S.meds[midx].steps[sidx][field]=val;save();renderOutputs();
}
function setMedField(midx,field,val){
  S.meds[midx][field]=val;save();renderOutputs();
  // Header name needs DOM refresh
  if(field==='customName'){const el=document.querySelector('[data-medname="'+midx+'"]');if(el)el.textContent=val;}
}
function resetMedToDefault(midx){
  const key=S.meds[midx].key;
  if(!confirm('Reset this medication\'s plan to the catalogue defaults?'))return;
  const def=MED_CATALOG[key];
  if(!def)return;
  S.meds[midx].steps=clone(def.steps);
  S.meds[midx].authority=def.authority;
  S.meds[midx].mitte=def.mitte;
  S.meds[midx].repeats=def.repeats;
  save();render();
}

/* ─────────────────────── HEADER / FIELDS ──────────────────────────────── */
function bindHeader(){
  ['patientName','patientDob','clinician','visitDate'].forEach(id=>{
    const el=$(id);if(!el)return;
    el.addEventListener('input',()=>{S[id]=el.value;save();renderOutputs();});
    if(S[id])el.value=S[id];
  });
}
function resetAll(){
  if(!confirm('Clear everything — patient details and all medications?'))return;
  Object.keys(S).forEach(k=>{if(Array.isArray(S[k]))S[k]=[];else S[k]='';});
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  document.querySelectorAll('input,select').forEach(el=>{if(el.type!=='button')el.value='';});
  render();
}

/* ─────────────────────────── RENDER ───────────────────────────────────── */
function render(){
  renderMedList();
  renderOutputs();
}
function renderMedList(){
  const wrap=$('medList');
  const empty=$('medEmpty');
  if(!S.meds.length){wrap.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  wrap.innerHTML=S.meds.map((m,i)=>{
    const classLbl=m.class==='stimulant'?'Stimulant':m.class==='nonstim'?'Non-stimulant':'Other';
    const classCls=m.class==='stimulant'?'stimulant':m.class==='nonstim'?'nonstim':'other';
    const rows=m.steps.map((st,si)=>`
      <tr>
        <td style="width:18%"><input value="${esc(st.label)}" oninput="setStepField(${i},${si},'label',this.value)"></td>
        <td style="width:14%"><input value="${esc(st.dur)}" oninput="setStepField(${i},${si},'dur',this.value)"></td>
        <td style="width:30%"><input value="${esc(st.sig)}" oninput="setStepField(${i},${si},'sig',this.value)" placeholder="dose & frequency"></td>
        <td style="width:14%"><input value="${esc(st.totalDose||'')}" oninput="setStepField(${i},${si},'totalDose',this.value)" placeholder="total daily"></td>
        <td><textarea oninput="setStepField(${i},${si},'notes',this.value)" rows="1" placeholder="Optional note">${esc(st.notes||'')}</textarea></td>
        <td style="width:80px"><div class="step-actions">
          <button class="icon-btn" onclick="moveStep(${i},${si},-1)" title="Move up">↑</button>
          <button class="icon-btn" onclick="moveStep(${i},${si},1)" title="Move down">↓</button>
          <button class="icon-btn danger" onclick="removeStep(${i},${si})" title="Remove step">×</button>
        </div></td>
      </tr>`).join('');
    return `
      <div class="med-card">
        <div class="med-card-head">
          <div>
            <span class="med-name" data-medname="${i}">${esc(m.customName||m.name)}</span>
            <span class="med-generic">${esc(m.generic||'')}</span>
            <span class="med-class-pill ${classCls}">${classLbl}${m.schedule?' · '+esc(m.schedule):''}</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn sm ghost" onclick="resetMedToDefault(${i})">Reset plan</button>
            <button class="btn sm danger" onclick="removeMed(${i})">Remove</button>
          </div>
        </div>
        <div class="auth-line"><strong>Authority / notes:</strong>
          <input value="${esc(m.authority||'')}" oninput="setMedField(${i},'authority',this.value)" style="border:none;background:transparent;width:100%;font:13px var(--sans);color:#475569;padding:2px 0;margin-top:2px">
        </div>
        <table class="step-table">
          <thead><tr><th>Label</th><th>Duration</th><th>Dose / sig</th><th>Total daily</th><th>Notes</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="step-foot">
          <div class="left"><button class="btn sm ghost" onclick="addStep(${i})">+ Add step</button></div>
        </div>
        <div class="script-controls">
          <div><label>Mitte (quantity)</label><input value="${esc(m.mitte||'')}" oninput="setMedField(${i},'mitte',this.value)" placeholder="e.g. 30 caps"></div>
          <div><label>Repeats</label><input type="number" min="0" max="11" value="${esc(m.repeats==null?'':m.repeats)}" oninput="setMedField(${i},'repeats',this.value)"></div>
          <div><label>Interval rule</label><input value="${esc(m.intervalRule||'')}" oninput="setMedField(${i},'intervalRule',this.value)" placeholder="e.g. 20-day"></div>
        </div>
      </div>`;
  }).join('');
}

/* ─────────────────────────── OUTPUTS ──────────────────────────────────── */
function patientHeaderText(){
  const name=S.patientName||'[Patient name]';
  const dob=S.patientDob?new Date(S.patientDob+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):'';
  const date=S.visitDate?new Date(S.visitDate+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  return {name,dob,date};
}
function finalStep(m){
  // Final maintenance step = last step (or last ongoing one)
  const ongoing=m.steps.filter(s=>/ongoing/i.test(s.dur||''));
  if(ongoing.length)return ongoing[ongoing.length-1];
  return m.steps[m.steps.length-1];
}

/* ── eScript output ───────────────────────────────────────────────────── */
function buildEscript(){
  if(!S.meds.length)return '— Add a medication on the left to generate the eScript output.';
  const h=patientHeaderText();
  let out='';
  out+='PATIENT: '+h.name+(h.dob?'  DOB '+h.dob:'')+'\n';
  out+='DATE:    '+h.date+(S.clinician?'   CLINICIAN: '+S.clinician:'')+'\n';
  out+='─────────────────────────────────────────────\n\n';
  S.meds.forEach((m,i)=>{
    const fin=finalStep(m);
    out+=(i+1)+'. '+(m.customName||m.name).toUpperCase()+'\n';
    if(m.generic)out+='   '+m.generic+'\n';
    out+='   Sig:     '+(fin.sig||'(no dose set)')+'\n';
    if(fin.totalDose)out+='   Total:   '+fin.totalDose+'\n';
    if(m.mitte)out+='   Mitte:   '+m.mitte+'\n';
    if(m.repeats!==''&&m.repeats!=null)out+='   Repeats: '+m.repeats+'\n';
    if(m.intervalRule)out+='   Interval: '+m.intervalRule+'\n';
    if(m.authority)out+='   Notes:   '+m.authority+'\n';
    out+='\n';
  });
  return out.trimEnd();
}

/* ── Letter prose ─────────────────────────────────────────────────────── */
function buildLetter(){
  if(!S.meds.length)return '<p class="empty" style="margin:0">Add a medication on the left to generate the letter prose.</p>';
  const h=patientHeaderText();
  const opening='<p><strong>Date:</strong> '+esc(h.date)+'</p>'+
    '<p>The following titration plan has been arranged for <strong>'+esc(h.name)+'</strong>'+(h.dob?' (DOB '+esc(h.dob)+')':'')+'.</p>';
  const meds=S.meds.map((m,i)=>{
    const name=(m.customName||m.name);
    const intro='<p><strong>'+esc(name)+'</strong>'+(m.generic?' ('+esc(m.generic)+')':'')+' is to be commenced and titrated as follows.</p>';
    // Compose narrative — each step as a sentence connected naturally
    const stepLines=m.steps.map((st,si)=>{
      const lead=si===0?'For the first phase ('+esc(st.label)+', '+esc(st.dur)+'),':
                 si===m.steps.length-1?'For ongoing maintenance ('+esc(st.label)+'),':
                 'At '+esc(st.label)+' ('+esc(st.dur)+'),';
      const sig=st.sig?' the dose is <strong>'+esc(st.sig)+'</strong>':'';
      const total=st.totalDose?' giving a total daily dose of '+esc(st.totalDose):'';
      const note=st.notes?'. '+esc(st.notes).replace(/\.\s*$/,'')+'.':'.';
      return '<p>'+lead+sig+total+(note==='.'?'.':note)+'</p>';
    }).join('');
    // Authority / mitte
    const scriptBits=[];
    if(m.mitte)scriptBits.push('mitte '+esc(m.mitte));
    if(m.repeats!==''&&m.repeats!=null)scriptBits.push(esc(m.repeats)+' repeats');
    if(m.intervalRule)scriptBits.push(esc(m.intervalRule)+' interval');
    const scriptLine=scriptBits.length?'<p>The prescription will be written for '+scriptBits.join(', ')+'.</p>':'';
    const auth=m.authority?'<p><em>'+esc(m.authority)+'</em></p>':'';
    return intro+stepLines+scriptLine+auth;
  }).join('<hr style="border:none;border-top:1px solid #e2e8f0;margin:14px 0">');
  const close='<p>Please contact me if there are any concerns regarding the above plan.</p>'+
    (S.clinician?'<p>'+esc(S.clinician)+'</p>':'');
  return opening+meds+close;
}

/* ── Table output ─────────────────────────────────────────────────────── */
function buildTable(){
  if(!S.meds.length)return '<div class="empty">Add a medication on the left to generate the schedule.</div>';
  const h=patientHeaderText();
  let out='<div style="font:600 13px var(--sans);color:var(--primary);margin-bottom:10px"><span>'+esc(h.name)+'</span>'+(h.dob?' &nbsp;·&nbsp; DOB '+esc(h.dob):'')+' &nbsp;·&nbsp; '+esc(h.date)+(S.clinician?' &nbsp;·&nbsp; '+esc(S.clinician):'')+'</div>';
  out+=S.meds.map((m,i)=>{
    const rows=m.steps.map(st=>`
      <tr>
        <td><strong>${esc(st.label||'')}</strong></td>
        <td>${esc(st.dur||'')}</td>
        <td>${esc(st.sig||'')}</td>
        <td>${esc(st.totalDose||'')}</td>
        <td>${esc(st.notes||'')}</td>
      </tr>`).join('');
    const scriptBits=[];
    if(m.mitte)scriptBits.push('Mitte '+esc(m.mitte));
    if(m.repeats!==''&&m.repeats!=null)scriptBits.push(esc(m.repeats)+' repeats');
    if(m.intervalRule)scriptBits.push(esc(m.intervalRule));
    return `
      <div style="margin-bottom:18px">
        <div style="font:700 14px var(--sans);color:var(--primary);margin-bottom:4px">${esc(m.customName||m.name)} ${m.generic?'<span style=\"font-weight:400;color:var(--muted);font-size:12px\">— '+esc(m.generic)+'</span>':''}</div>
        ${m.authority?'<div style="font:11.5px var(--sans);color:#475569;background:#fff7ed;border:1px solid #fde68a;padding:6px 10px;border-radius:6px;margin:4px 0 8px">'+esc(m.authority)+'</div>':''}
        <table class="schedule">
          <thead><tr><th style="width:18%">Step</th><th style="width:14%">Duration</th><th style="width:28%">Dose / sig</th><th style="width:14%">Total daily</th><th>Notes</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${scriptBits.length?'<div style="font:12px var(--sans);color:var(--muted);margin-top:6px">Prescription: '+scriptBits.join(' · ')+'</div>':''}
      </div>`;
  }).join('');
  return out;
}

function renderOutputs(){
  $('out-escript').innerHTML='<pre class="escript">'+esc(buildEscript())+'</pre>';
  $('out-letter').innerHTML='<div class="letter">'+buildLetter()+'</div>';
  $('out-table').innerHTML=buildTable();
}

/* ────────────────────────── TABS / ACTIONS ────────────────────────────── */
function setTab(name){
  activeTab=name;
  document.querySelectorAll('.out-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.out-pane').forEach(p=>p.classList.toggle('active',p.id==='out-'+name));
}
function copyActive(){
  let txt='';
  if(activeTab==='escript')txt=buildEscript();
  else{
    const el=$('out-'+activeTab);
    txt=el?el.innerText:'';
  }
  // Write rich html + plain
  if(navigator.clipboard&&navigator.clipboard.write&&window.ClipboardItem&&activeTab!=='escript'){
    const html=$('out-'+activeTab).innerHTML;
    try{
      navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob(['<html><body style="font-family:Arial,sans-serif">'+html+'</body></html>'],{type:'text/html'}),
        'text/plain':new Blob([txt],{type:'text/plain'})
      })]).then(flash).catch(()=>navigator.clipboard.writeText(txt).then(flash));
      return;
    }catch(e){}
  }
  navigator.clipboard.writeText(txt).then(flash);
}
function flash(){
  const btn=document.querySelector('.out-actions .btn');
  if(!btn)return;
  const orig=btn.textContent;btn.textContent='Copied';btn.classList.add('ghost');
  setTimeout(()=>{btn.textContent=orig;},1200);
}
function printActive(){
  // Open a fresh window with the active pane's HTML
  const h=patientHeaderText();
  const title='Titration plan — '+h.name;
  let body='';
  if(activeTab==='escript')body='<pre style="font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap">'+esc(buildEscript())+'</pre>';
  else if(activeTab==='letter')body='<div style="font:14px/1.6 Georgia,Times,serif">'+buildLetter()+'</div>';
  else body=buildTable();
  const w=window.open('','_blank','width=900,height=900');
  if(!w)return;
  w.document.write('<!DOCTYPE html><html><head><title>'+esc(title)+'</title>'+
    '<style>body{font-family:Arial,sans-serif;color:#111;padding:24px;max-width:780px;margin:0 auto}h1{font-size:16px;margin:0 0 12px;color:#1e3a5f}table{border-collapse:collapse;width:100%;font-size:13px;margin:6px 0 12px}th,td{border:1px solid #cbd5e1;padding:6px 8px;text-align:left;vertical-align:top}th{background:#1e3a5f;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.04em}p{margin:0 0 10px}@media print{body{padding:0}}</style></head><body>'+
    '<h1>Titration plan — '+esc(h.name)+'</h1>'+body+'</body></html>');
  w.document.close();setTimeout(()=>{w.print();},250);
}

/* ─────────────────────────── INIT ─────────────────────────────────────── */
load();
bindHeader();
populatePicker();
$('medClassFilter').addEventListener('change',populatePicker);
// Default visit date to today if blank
if(!S.visitDate){S.visitDate=new Date().toISOString().slice(0,10);$('visitDate').value=S.visitDate;save();}
render();
</script>
