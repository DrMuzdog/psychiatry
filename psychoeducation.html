    {id:'why_compulsions_worsen',title:'Why compulsions make OCD worse',body:'<p><strong>The core problem:</strong> Compulsions work — in the short term. They reduce anxiety quickly and reliably. This is exactly why they become entrenched and why OCD worsens over time despite compulsive effort.</p><p><strong>Five reasons compulsions maintain and worsen OCD:</strong></p><ul><li><strong>Negative reinforcement:</strong> The compulsion removes discomfort, which teaches the brain to perform it again next time. The association between obsession and compulsion strengthens.</li><li><strong>They confirm the threat:</strong> Performing a compulsion signals to the brain that the obsessive thought was dangerous and the compulsion was necessary. The brain\'s threat detection system is validated, making future responses more intense.</li><li><strong>They prevent habituation:</strong> If you tolerate the anxiety without compulsing, it peaks and then naturally reduces. Compulsing prevents this learning — you never discover that anxiety reduces on its own.</li><li><strong>They expand:</strong> Over time, compulsions usually need to be performed more thoroughly, more times, or in new situations to achieve the same relief. OCD escalates.</li><li><strong>Avoidance contracts your life:</strong> Avoiding OCD triggers reduces your world rather than your OCD.</li></ul><p><strong>Mental compulsions are compulsions:</strong> Reviewing, mentally neutralising, suppressing, praying, "undoing" — all of these maintain OCD just as physical compulsions do. They are harder to identify and target, but the principle is identical.</p><p><strong>The only effective long-term intervention:</strong> Break the compulsion-relief cycle. ERP does this by deliberately triggering the obsession and practising sitting with the anxiety without compulsing — until the brain learns a new association.</p>'},
    {id:'reassurance_accommodation',title:'Reassurance seeking and family accommodation',body:'<p><strong>Reassurance seeking is a compulsion.</strong> Asking others "Are you sure I locked it?", "I didn\'t say anything offensive, did I?", "I\'m not a bad person, right?" feels necessary and urgent. Like all compulsions, reassurance provides brief relief and worsens OCD over time by confirming the brain\'s threat signal and preventing tolerance of uncertainty.</p><p><strong>Why reassurance never satisfies:</strong> OCD\'s core problem is intolerance of uncertainty. Reassurance provides certainty — briefly. Then doubt returns. Then more reassurance is needed, often escalating in frequency and specificity. The target shifts. The relief window shortens.</p><p><strong>What to tell people who ask for reassurance:</strong> If someone asks you for OCD-driven reassurance, the most helpful response is a compassionate non-answer: <em>"I know you\'re anxious right now. I care about you, and I\'m not going to reassure you, because it won\'t actually help."</em> This should be agreed on in advance, not during an OCD episode.</p><p><strong>Family accommodation:</strong> Participating in rituals, providing reassurance, modifying household routines to avoid OCD triggers, doing tasks for the person to prevent their distress — all of these reduce immediate distress but maintain and worsen OCD. Research consistently shows high family accommodation is associated with worse OCD outcomes.</p><p><strong>Helpful vs unhelpful responses from others:</strong></p><ul><li><em>Unhelpful:</em> Repeated reassurance, participating in rituals, helping avoid triggers, criticising or expressing frustration</li><li><em>Helpful:</em> Compassionate limit-setting, supporting engagement with treatment, encouraging approach rather than avoidance, not accommodating compulsions while remaining emotionally supportive</li></ul>'},
    {id:'ocd_faqs',title:'Commonly asked questions',body:'<p><strong>Does having OCD mean I\'m "crazy"?</strong> No. OCD is a recognised anxiety-related disorder with well-understood neurobiology and highly effective treatments. Having OCD says nothing about your intelligence, character, or sanity.</p><p><strong>Does having the thought mean I want to do it?</strong> No. The research on this is unambiguous. Intrusive thoughts about harm, taboo acts, or contamination are common in the general population. People with OCD find these thoughts deeply distressing precisely because they conflict with their values.</p><p><strong>Will OCD go away on its own?</strong> Rarely. Without treatment, OCD tends to be chronic. With treatment — particularly ERP — the majority of people achieve substantial symptom reduction. "Recovery" in OCD typically means the thoughts remain manageable and compulsions are no longer driven by them.</p><p><strong>If I avoid my triggers, won\'t I be fine?</strong> Avoidance provides short-term relief and long-term worsening. OCD expands to fill available space. Avoiding one trigger typically leads to the development of others.</p><p><strong>My OCD thoughts are so specific and shameful — does that mean something?</strong> No. The more distressing and ego-dystonic (against your values) the thought, the more likely it is to be OCD rather than genuine intent. OCD specifically targets what you care most about.</p><p><strong>Is OCD genetic?</strong> Partly. First-degree relatives of people with OCD have a 2–3 times higher risk. However, environmental factors, stress, and life events also contribute significantly.</p><p><strong>Can children have OCD?</strong> Yes. OCD commonly begins in childhood or adolescence. The average onset is between 10–20 years, though it can occur at any age. Childhood OCD is often presented differently — more rituals, fewer articulated obsessions.</p><p><strong>Will I need to be on medication forever?</strong> Not necessarily. Many people use medication during treatment and taper once ERP skills are established. Others continue long-term. This is an individual decision made with your prescriber.</p><p><strong>Is OCD related to ADHD or autism?</strong> They can co-occur. ADHD and OCD overlap in rates of around 20–30%. Autism and OCD require careful differential diagnosis — repetitive behaviours in autism are usually ego-syntonic (not distressing), while OCD compulsions are driven by anxiety relief. Co-occurring ADHD can complicate ERP engagement and is worth treating separately.</p>'}
  ]},
  {label:'Treatment',optional:false,items:[
    {id:'erp',title:'ERP — Exposure and Response Prevention',body:'<p><strong>ERP is the gold standard psychological treatment for OCD.</strong> Multiple meta-analyses consistently show response rates of 60–85%. Nothing else comes close for OCD specifically.</p><p><strong>The core principle:</strong> Deliberately expose yourself to a feared stimulus (the obsession or its trigger) and resist performing the compulsion — until the anxiety reduces on its own. This directly targets the cycle and rewires the brain\'s threat response.</p><p><strong>How it works (inhibitory learning model):</strong> ERP doesn\'t erase the old fear memory — it builds a new, competing memory: "This stimulus is not dangerous, and I can tolerate the uncertainty." With repetition, the new learning becomes dominant.</p><p><strong>What a course of ERP looks like:</strong></p><ul><li>Build an exposure hierarchy — a ranked list of feared situations from mildly distressing to most distressing (using a SUDS scale 0–100).</li><li>Begin with moderate-level exposures (around 40–60 SUDS) — not the easiest, not the hardest.</li><li>During exposure: allow the anxiety to be present, resist all compulsions (including mental ones), stay with the discomfort until it reduces naturally.</li><li>Repeat until the item no longer provokes significant anxiety, then progress up the hierarchy.</li><li>A full course is typically 12–20 sessions with a skilled OCD therapist.</li></ul><p><strong>What "response prevention" means:</strong> Not performing the compulsion at all — not a modified or shorter version. For mental compulsions, this means not mentally reviewing, neutralising, or suppressing. Replacing one compulsion with another does not count.</p><p><strong>Expected discomfort:</strong> ERP works by allowing anxiety to be present. It will be uncomfortable. This discomfort is temporary and is the mechanism of change — not a sign that something is wrong. The anxiety will reduce without compulsions. Every time it does, the brain learns something important.</p><p><strong>Finding a therapist:</strong> Not all therapists are skilled in ERP. Look for a psychologist with specific OCD experience. The International OCD Foundation (iocdf.org) has a therapist directory. NOCD (nocdcare.com) provides specialist ERP therapy remotely.</p>'},
    {id:'medication',title:'Medication for OCD',body:'<p><strong>First-line: SSRIs (Selective Serotonin Reuptake Inhibitors)</strong></p><p>SSRIs are the evidence-based medication choice for OCD. They reduce the frequency and intensity of obsessions and lower the anxiety baseline, making ERP engagement more achievable.</p><table><thead><tr><th>Medication</th><th>Notes</th></tr></thead><tbody><tr><td><strong>Sertraline</strong></td><td>Good tolerability, strong evidence for OCD. Common first choice.</td></tr><tr><td><strong>Fluoxetine</strong></td><td>Long half-life — fewer withdrawal effects. Suitable for those likely to miss doses.</td></tr><tr><td><strong>Fluvoxamine</strong></td><td>Licensed specifically for OCD. Multiple drug interactions — review carefully.</td></tr><tr><td><strong>Escitalopram</strong></td><td>Well-tolerated, used widely in OCD though not licensed for it specifically.</td></tr><tr><td><strong>Paroxetine</strong></td><td>Effective but discontinuation syndrome common — taper carefully.</td></tr><tr><td><strong>Clomipramine</strong></td><td>Tricyclic antidepressant. Highest evidence base for OCD of any medication. Reserved for SSRI non-response due to side effect profile (anticholinergic, cardiac).</td></tr></tbody></table><p><strong>Key differences from depression treatment:</strong></p><ul><li>OCD typically requires <strong>higher doses</strong> than depression — e.g. sertraline up to 200mg/day</li><li><strong>Slower onset:</strong> Full effect may take 8–16 weeks. Response at 6 weeks does not mean the medication has failed.</li><li>Typical outcome: <strong>30–40% reduction in symptoms</strong>. Medication alone rarely produces full remission — combined with ERP, outcomes are substantially better.</li></ul><p><strong>Second-line — augmentation:</strong> If SSRI response is partial, augmentation with a low-dose antipsychotic (risperidone, aripiprazole) or clomipramine can improve response. D-cycloserine can enhance ERP learning when used on exposure session days.</p><p><strong>Starting SSRI treatment — what to expect:</strong> Early side effects (nausea, initial anxiety spike, insomnia) usually settle within 2–3 weeks. Take with food. Do not stop abruptly — taper under guidance.</p>'},
    {id:'act_for_ocd',title:'ACT for OCD — Acceptance and Commitment Therapy',body:'<p><strong>ACT as an approach:</strong> Rather than changing the content of obsessive thoughts, ACT targets your relationship with those thoughts. The goal is psychological flexibility — the ability to have a distressing thought and still act in accordance with your values.</p><p><strong>Key ACT processes applied to OCD:</strong></p><ul><li><strong>Defusion:</strong> Creating distance from thoughts rather than treating them as literal truths or commands. Instead of "I might hurt someone," try: "I notice I\'m having the thought that I might hurt someone." The thought is seen as a mental event, not a fact. This reduces its power without requiring suppression.</li><li><strong>Acceptance:</strong> Allowing anxiety, doubt, and uncertainty to be present without trying to eliminate or reduce them. Paradoxically, accepting anxiety tends to reduce it more than fighting it.</li><li><strong>Values clarification:</strong> Identifying what genuinely matters — relationships, contribution, creativity, health — and acting on those values even in the presence of anxiety. OCD shrinks life; values work expands it.</li><li><strong>Committed action:</strong> Taking concrete steps toward valued goals while carrying the discomfort of OCD with you, rather than waiting until OCD is resolved to live your life.</li><li><strong>Present-moment awareness:</strong> Defusing from rumination about past compulsions or catastrophising about future scenarios, and re-engaging with the present.</li></ul><p><strong>ACT vs traditional CBT for OCD:</strong> Both involve approach rather than avoidance. ACT does not require you to challenge or dispute whether thoughts are true — it sidesteps the struggle entirely. Useful for people who find cognitive restructuring ineffective or who have become skilled debaters with their OCD.</p>'},
    {id:'treatment_expectations',title:'What to expect from treatment',body:'<p><strong>ERP is hard before it is helpful.</strong> The early stages require approaching things that feel genuinely threatening. Discomfort is the mechanism — not a sign that treatment is failing. Most people feel worse before they feel better in the first few sessions.</p><p><strong>What improvement looks like:</strong></p><ul><li>Obsessive thoughts become less frequent and less "sticky" — they no longer command the same attention.</li><li>Anxiety peaks lower and reduces faster during exposures.</li><li>The urge to compulse reduces over time.</li><li>The range of situations you can engage with expands.</li><li>OCD becomes a manageable background presence rather than a dominant force.</li></ul><p><strong>Important expectations to set:</strong></p><ul><li>Full remission (no OCD at all) is uncommon — meaningful symptom reduction is the realistic goal for most.</li><li>Recovery is not linear. Relapses are normal and do not mean treatment has failed — they are opportunities to practise what was learned.</li><li>Major life stressors (exams, illness, relationship changes, sleep deprivation) typically worsen OCD temporarily. This is predictable and manageable.</li><li>The skills learned in ERP are permanent. Even when OCD worsens, those who have completed ERP recover faster than those who haven\'t.</li></ul><p><strong>Measuring progress:</strong> The Y-BOCS (Yale-Brown Obsessive Compulsive Scale) is the standard measure. A reduction of 35% or more is considered treatment response. Anything positive is meaningful — even 20% reduction in a severe presentation can substantially improve quality of life.</p><p><strong>Combined treatment is best:</strong> ERP plus SSRI outperforms either alone. Medication lowers the anxiety baseline, making exposure work more achievable. Therapy builds permanent skills that medication alone cannot provide.</p>'}
  ]},
  {label:'Strategies and Self-Help',optional:true,items:[
    {id:'erp_hierarchy',title:'Building an exposure hierarchy',body:'<p><strong>The exposure hierarchy is the map for treatment.</strong> It is a personalised, ranked list of feared situations — from the mildly distressing to the most avoided — that guides the order of exposures in therapy and self-directed practice.</p><p><strong>Step 1 — List your triggers:</strong> Write down every situation, object, thought, image, or action that provokes an obsession or leads to a compulsion. Include things you currently avoid entirely.</p><p><strong>Step 2 — Rate each item:</strong> Use the SUDS scale (Subjective Units of Distress Scale) from 0 (no distress) to 100 (maximum distress). Rate based on how you would feel if you triggered the situation AND did not compulse.</p><p><strong>Step 3 — Order the list.</strong> Arrange from lowest to highest SUDS.</p><p><strong>Step 4 — Start in the middle, not at the bottom:</strong> Beginning with items rated around 40–60 builds momentum faster than starting with trivially easy items. Work your way up systematically.</p><p><strong>Example hierarchy — contamination OCD:</strong></p><ul><li>20 — Touching a doorknob in own home without washing (20 SUDS)</li><li>35 — Touching a public ATM keypad without washing (35)</li><li>50 — Touching a public toilet door handle without washing (50)</li><li>65 — Using a public toilet and not washing until one hour later (65)</li><li>80 — Touching contaminated object and then touching food before eating (80)</li></ul><p><strong>The goal:</strong> Remain in contact with the trigger — without compulsing — until the anxiety naturally reduces by at least 50%. This reduction is the brain learning. Repeat each step until SUDS drops significantly before progressing.</p>'},
    {id:'daily_management',title:'Managing OCD day to day',body:'<p><strong>Label the thought, not yourself:</strong> When an obsession arrives, practise saying (internally or aloud): "This is OCD. This is a false alarm." Not to argue with it or reassure yourself — simply to create a small distance. You are not your OCD.</p><p><strong>Delay the compulsion:</strong> If completely resisting feels impossible, start with delay. "I will wait 15 minutes before checking." This is not the goal of ERP, but it disrupts the automatic compulsion-relief pathway and builds tolerance.</p><p><strong>Do not avoid triggers:</strong> Every time you avoid something OCD-related, OCD grows. Approach triggers whenever it is safe to do so, even if you cannot fully resist compulsing yet.</p><p><strong>Time-limit rituals:</strong> If stopping a compulsion entirely is not yet achievable, set a fixed limit — not to make the compulsion more comfortable, but to create structure while working toward full response prevention.</p><p><strong>Sleep and physical baseline:</strong> OCD is consistently worse with sleep deprivation, high stress, and low physical activity. These are not luxuries — they are prerequisites for OCD management.</p><p><strong>Diary of progress:</strong> Note each time you resist a compulsion, delay a ritual, or approach a trigger. Progress in OCD is incremental and easy to discount — a record makes it visible.</p><p><strong>Scheduled worry time:</strong> For OCD that manifests partly as rumination, a brief scheduled "OCD window" (10–15 minutes/day) in which you deliberately engage with the thoughts — and then return to normal activity — can reduce the intrusion of obsessions outside that window. This is not suitable for all OCD presentations; discuss with your therapist.</p>'},
    {id:'family_guide',title:'Helping family and partners understand OCD',body:'<p><strong>What OCD is not:</strong> Not attention-seeking, not a choice, not weakness, not "something they could stop if they really wanted to." OCD is a neurobiological disorder with a strong evidence base for treatment.</p><p><strong>The hardest thing for loved ones:</strong> Watching someone you care about suffer and knowing that helping them compulse or reassure them feels kind but makes things worse. This is genuinely difficult. The research is clear: accommodation worsens OCD outcomes.</p><p><strong>How to respond to reassurance requests:</strong> Agree on a script in advance, when the person is calm — not during an OCD episode. Something like: <em>"I know you\'re struggling and I care about you. We agreed I wouldn\'t reassure you — it doesn\'t actually help, even though it feels like it would."</em></p><p><strong>What is and isn\'t helpful:</strong></p><ul><li><strong>Helpful:</strong> Emotional support and warmth, encouragement to engage with treatment, celebrating small wins (resisting a compulsion), offering to attend therapy sessions</li><li><strong>Unhelpful:</strong> Providing reassurance, participating in rituals, modifying household routines to accommodate OCD, expressions of frustration or disbelief</li></ul><p><strong>Family therapy:</strong> When family accommodation is significant, family-based CBT (or at minimum, a session with the treating psychologist) substantially improves outcomes. IOCDF (iocdf.org) has resources for families.</p><p><strong>Taking care of yourself:</strong> Living with someone with OCD can be exhausting and distressing. Carers benefit from their own support — GP review, peer support groups (Beyond Blue, IOCDF carers support), or their own therapy.</p>'}
  ]},
  {label:'Products and Resources',optional:true,items:[
    {id:'ocd_books',title:'Recommended books',body:'<p><strong>Freedom from Obsessive-Compulsive Disorder</strong> — Jonathan Abramowitz. The most comprehensive, practical, evidence-based self-help book for OCD adults. Written by one of the leading OCD researchers. Covers ERP thoroughly with worked examples.</p><p><strong>Brain Lock</strong> — Jeffrey Schwartz. Classic four-step self-directed approach (Relabel, Reattribute, Refocus, Revalue). Accessible, with strong neurobiological grounding. Not pure ERP, but useful for understanding the OCD brain.</p><p><strong>Overcoming Unwanted Intrusive Thoughts</strong> — Sally Winston &amp; Martin Seif. Essential for Pure O / intrusive thought presentations. Explains why suppression and reassurance-seeking maintain intrusive thoughts and what to do instead.</p><p><strong>The OCD Workbook</strong> — Bruce Hyman &amp; Cherry Pedrick. Step-by-step structured workbook format. Good for those who prefer guided self-help exercises alongside therapy.</p><p><strong>The Mindfulness Workbook for OCD</strong> — Jon Hershfield &amp; Tom Corboy. Integrates ACT and mindfulness principles with ERP. Useful for those who find pure behavioural approaches insufficient or want to address the relationship with thoughts more explicitly.</p><p><strong>Everyday Mindfulness for OCD</strong> — Jon Hershfield &amp; Shala Nicely. Shorter, practical, readable. Good follow-up to more comprehensive texts.</p>'},
    {id:'ocd_apps_resources',title:'Apps and online resources',body:'<p><strong>NOCD</strong> — Specialist OCD therapy platform. Provides access to therapists trained specifically in ERP. Telehealth delivery. Rigorous clinical framework. <a href="https://www.nocdcare.com" target="_blank">nocdcare.com</a></p><p><strong>OCD Australia</strong> — Australian OCD-specific organisation. Information, resources, support groups, and clinician directory. <a href="https://www.ocdaustralia.com.au" target="_blank">ocdaustralia.com.au</a></p><p><strong>International OCD Foundation (IOCDF)</strong> — Global resource. Excellent therapist directory (search for ERP-trained clinicians), education materials, conference community. <a href="https://iocdf.org" target="_blank">iocdf.org</a></p><p><strong>nOCD App</strong> — Free app for tracking exposures, logging compulsions, and working through a structured ERP hierarchy. Clinician-developed. Useful adjunct to therapy. <a href="https://www.treatmyocd.com" target="_blank">treatmyocd.com</a></p><p><strong>Finch</strong> — Self-care and CBT-informed app. Not OCD-specific but useful for daily mood tracking, values-based goals, and building wellbeing habits that support OCD treatment. Available on iOS and Android.</p><p><strong>Beyond Blue (1300 22 4636)</strong> — Australian mental health helpline. Not OCD-specific but available for crisis support and referral guidance.</p>'}
  ]}
]

var INSOMNIA_PE_GROUPS=[
  {label:null,optional:false,items:[
    {id:'what_insomnia_is',title:'What insomnia actually is',body:'<p><strong>Beyond "not enough sleep":</strong> Insomnia is a disorder of hyperarousal — not simply a sleep deficiency. This distinction matters. The defining feature of insomnia is not that you sleep too little; it is that your nervous system has become chronically over-activated around sleep. The problem is not a broken sleep system — it is a system that has learned to treat bedtime as a threat.</p> <p><strong>Diagnostic criteria (chronic insomnia):</strong></p> <ul> <li>Difficulty initiating or maintaining sleep, or early morning waking with inability to return to sleep</li> <li>Despite adequate opportunity and environment for sleep</li> <li>Associated with daytime impairment (fatigue, mood, cognition, performance)</li> <li>Occurs at least 3 nights per week</li> <li>Has persisted for at least 3 months</li> </ul> <p><strong>Prevalence:</strong> Approximately 10–15% of adults meet criteria for chronic insomnia disorder. A further 25–35% report clinically significant insomnia symptoms. It is the most common sleep complaint in clinical practice and frequently co-occurs with depression, anxiety, chronic pain, and cardiovascular conditions.</p> <p><strong>Why it is more than "bad sleep habits":</strong> Chronic insomnia represents a learned dysregulation of the sleep system — shaped by biological vulnerability, perpetuating behaviours, and cognitive patterns — that is self-sustaining long after the original trigger has resolved. A stressful event might start insomnia; what keeps it going is a different problem entirely.</p> <p><strong>Prognosis:</strong> Chronic insomnia does not resolve reliably on its own. Without targeted intervention, it tends to persist and worsen. With evidence-based treatment (CBT-I), 70–80% of people achieve clinically meaningful improvement, and effects are durable — unlike medication, which typically only works while being taken.</p>'},
    {id:'two_process_model',title:'The two-process model of sleep — why it matters for insomnia',body:'<p>Sleep is regulated by two independent biological processes that work together to produce a normal night\'s sleep. Understanding both is essential for understanding insomnia — and why the most effective treatments for it are counterintuitive.</p> <p><strong>Process S — Sleep Pressure (adenosine):</strong> From the moment you wake up, a chemical called adenosine accumulates in the brain. The longer you are awake, the more adenosine builds up, creating increasing "sleep pressure." When sleep pressure is high enough, you sleep — and during sleep, adenosine is cleared. Napping, spending excess time in bed, and sleeping in all reduce the adenosine load available at your next bedtime. This is why sleep restriction works.</p> <p><strong>Process C — Circadian Drive (the body clock):</strong> An internal 24-hour biological clock regulates alerting signals that rise through the day and fall in the evening. The clock is anchored primarily by light — particularly morning light. It promotes wakefulness during the day and permits sleep at night by withdrawing the alerting signal. Irregular sleep timing, insufficient morning light, bright light at night, and shift work all disrupt Process C.</p> <p><strong>How the two processes interact:</strong> Optimal sleep occurs when both processes align — high sleep pressure (from adequate time awake) combines with the circadian sleep window (body clock permitting sleep). Insomnia typically involves disruption of one or both: low sleep pressure from excessive time in bed, or circadian disruption from irregular timing.</p> <p><strong>Caffeine\'s mechanism:</strong> Caffeine blocks adenosine receptors — it does not remove adenosine, it temporarily masks the sleep pressure signal. When caffeine wears off, the accumulated adenosine binds rapidly, producing the "crash." Caffeine consumed after 2pm significantly impairs Process S at normal bedtimes in most people, even if sleep onset feels unaffected.</p> <p><strong>Why this model makes sleep restriction logical:</strong> By restricting time in bed, you allow adenosine to accumulate to a level that overrides the hyperarousal of insomnia. You are not "forcing" sleep — you are restoring the biological drive that hyperarousal has been suppressing.</p>'},
    {id:'hyperarousal_model',title:'The hyperarousal model — why trying harder makes insomnia worse',body:'<p><strong>The central paradox of insomnia:</strong> The harder you try to sleep, the less you sleep. This is not a platitude — it is a direct consequence of how the arousal system works. Sleep cannot be forced. It is a passive process that occurs when arousal is sufficiently low. Any effort to produce sleep increases arousal and actively prevents it.</p> <p><strong>What hyperarousal looks like:</strong></p> <ul> <li>Physiological: elevated heart rate and core body temperature at night, elevated cortisol, increased high-frequency EEG activity (even during sleep stages)</li> <li>Cognitive: racing thoughts, anticipatory worry about sleep, monitoring of time and arousal state</li> <li>Behavioural: clock-watching, trying to force sleep, spending extra time in bed, napping to compensate, avoiding activities for fear of worsening sleep</li> </ul> <p><strong>The insomnia maintenance loop:</strong></p> <p style="background:#f0fdfa;border-left:3px solid #0d9488;padding:8px 12px;border-radius:0 6px 6px 0;font-size:12pt">Poor night → daytime worry about sleep → hypervigilance at bedtime → increased arousal → poor night → loop continues</p> <p><strong>The conditioned arousal problem:</strong> Over weeks to months of insomnia, the bed itself becomes a conditioned cue for wakefulness and anxiety. This is Pavlovian conditioning: previously neutral stimuli (the bedroom, the act of lying down, seeing the time approach 10pm) become reliably associated with frustration, worry, and alertness. This is why stimulus control is a core component of CBT-I.</p> <p><strong>Why sleep monitoring makes it worse:</strong> Checking the clock during the night, tracking sleep with apps, counting hours — all of these direct attention toward the sleep process and increase arousal. People who monitor their sleep closely typically overestimate sleep latency and underestimate sleep duration. The monitoring itself becomes part of the problem.</p> <p><strong>The "trying not to think about it" trap:</strong> Thought suppression ("I must not think about sleep") paradoxically increases thought frequency — the same mechanism that operates in OCD. Acceptance-based approaches (not fighting the wakefulness, not trying to force sleep) are more effective than suppression or effort.</p>'},
    {id:'three_p_model',title:'The 3P model — predisposing, precipitating, perpetuating factors',body:'<p><strong>Why the 3P model matters:</strong> Understanding what started your insomnia (precipitant) is less clinically useful than understanding what is keeping it going (perpetuating factors). CBT-I targets the perpetuating factors — which is why it works long after the original trigger is gone.</p> <p><strong>Predisposing factors — biological and psychological vulnerability:</strong></p> <ul> <li>High trait anxiety or tendency toward hyperarousal</li> <li>Genetic predisposition (insomnia runs in families, heritability ~30–40%)</li> <li>Female sex (two-fold higher prevalence)</li> <li>History of depression or anxiety disorders</li> <li>High reactivity to stress</li> </ul> <p>Having predisposing factors does not mean insomnia is inevitable — but it lowers the threshold for development when a trigger occurs.</p> <p><strong>Precipitating factors — what started it:</strong></p> <ul> <li>Acute stressors: illness, bereavement, relationship breakdown, work pressure</li> <li>Medical events: pain, hospitalisation, surgery, pregnancy</li> <li>Environmental changes: shift work, jet lag, new environment</li> <li>Psychiatric episodes: depression, anxiety, trauma</li> <li>Medications or substances: corticosteroids, stimulants, alcohol withdrawal</li> </ul> <p>Critically: the precipitant often resolves, but the insomnia continues. This is the 3P model\'s key insight.</p> <p><strong>Perpetuating factors — what keeps it going:</strong></p> <ul> <li>Extending time in bed to "recover" lost sleep (reduces sleep pressure)</li> <li>Napping to compensate (further reduces sleep pressure)</li> <li>Irregular sleep timing (disrupts Process C)</li> <li>Clock-watching and sleep monitoring (increases arousal)</li> <li>Catastrophising about the consequences of poor sleep</li> <li>Avoidance of daytime activities due to fatigue</li> <li>Conditioned arousal in the bedroom environment</li> </ul> <p>Treatment targets the perpetuating factors. Removing the precipitant is often insufficient. The good news: perpetuating factors are modifiable.</p>'},
    {id:'sleep_state_misperception',title:'Sleep state misperception — sleeping more than you think',body:'<p><strong>A well-established phenomenon:</strong> Many people with insomnia significantly underestimate how much they are sleeping. This is not self-deception — it reflects a genuine and replicable mismatch between subjective experience and objective measurement. In polysomnography studies, people with insomnia consistently report fewer hours of sleep than EEG recording confirms. Some report being awake for hours during periods of confirmed stage 2 NREM sleep.</p> <p><strong>Why this happens:</strong></p> <ul> <li>The hyperaroused insomnia brain maintains partial awareness even during light sleep. The boundary between wakefulness and sleep is less distinct than in normal sleepers.</li> <li>Sleep onset is intrinsically difficult to detect subjectively — most people underestimate their sleep latency when falling asleep normally, but people with insomnia are in a state of anxious monitoring that preserves some awareness during early sleep stages.</li> <li>Frequent brief arousals during the night are tagged as "awake" when they are actually short-duration wakings from light NREM sleep.</li> </ul> <p><strong>Clinical relevance:</strong></p> <ul> <li>People with insomnia often report daytime fatigue and cognitive impairment despite sleeping more than they believe. This is real and not imagined — hyperarousal has direct daytime consequences regardless of objective sleep duration.</li> <li>The perception of "no sleep at all" — which some people report — is almost never accurate. Complete sleep deprivation is extraordinarily rare outside of extreme circumstances.</li> <li>This does not mean the distress is invalid. The subjective experience of insomnia is genuinely distressing and functionally impairing regardless of what the EEG shows.</li> </ul> <p><strong>What to do with this information:</strong> It is not a reason to dismiss the problem. It is a reason to approach sleep monitoring with some skepticism and to avoid the trap of using subjective nightly sleep estimates as a constant measure of success or failure. Functional improvement — better daytime energy, mood, performance — is a more reliable outcome measure than reported hours asleep.</p>'}
  ]},
  {label:'Treatment',optional:false,items:[
    {id:'cbti_overview',title:'CBT-I — the most effective treatment for insomnia',body:'<p><strong>CBT-I is the recommended first-line treatment for chronic insomnia.</strong> Multiple meta-analyses, systematic reviews, and clinical guidelines — including from the American College of Physicians, the American Academy of Sleep Medicine, and the NHS — rate CBT-I above medication for long-term outcomes. Its effects are durable; medication\'s effects are typically not.</p> <p><strong>What CBT-I actually involves:</strong> It is not relaxation therapy, sleep hygiene education, or advice to "wind down before bed." CBT-I is a structured, time-limited treatment that directly targets the perpetuating mechanisms of insomnia — particularly the behaviours and cognitions that maintain hyperarousal and conditioned wakefulness.</p> <p><strong>The core components:</strong></p> <ul> <li><strong>Sleep restriction therapy:</strong> Compressing time in bed to consolidate sleep and restore sleep pressure. Counterintuitive and temporarily uncomfortable, but the most powerful single component. See dedicated topic.</li> <li><strong>Stimulus control:</strong> Reconditioning the bed as a cue for sleep rather than wakefulness. See dedicated topic.</li> <li><strong>Cognitive restructuring:</strong> Identifying and modifying unhelpful beliefs about sleep (catastrophising, misconceptions about sleep requirements). See dedicated topic.</li> <li><strong>Sleep hygiene education:</strong> The least effective component of CBT-I — alone, it rarely produces clinically meaningful change. It is most useful as adjunctive support for the other components, not as a standalone intervention.</li> <li><strong>Relaxation training:</strong> Progressive muscle relaxation, slow breathing, or body scan to reduce somatic arousal. Useful as an adjunct, particularly for physiological hyperarousal.</li> </ul> <p><strong>Duration and format:</strong> A standard course is 6–8 weekly sessions. Digital CBT-I (Sleepio, Somryst) delivers the same components in automated format and has comparable efficacy to therapist-delivered CBT-I in randomised trials.</p> <p><strong>Who it works for:</strong> CBT-I is effective regardless of the original cause of insomnia — including insomnia comorbid with depression, anxiety, chronic pain, cancer, and other medical conditions. Comorbidity is not a contraindication.</p>'},
    {id:'sleep_restriction',title:'Sleep restriction — the most powerful (and counterintuitive) component',body:'<p><strong>The counterintuitive core:</strong> Sleep restriction involves spending less time in bed, not more. For someone exhausted by insomnia, this is deeply counterintuitive. It is also the most evidence-based, rapidly effective component of CBT-I. Understanding the mechanism makes it less frightening and more adherent.</p> <p><strong>The mechanism — sleep pressure restoration:</strong> Chronic insomnia involves low adenosine build-up at bedtime because people spend too long in bed. By restricting time in bed to closely match actual sleep time, adenosine accumulates to a level that overrides the conditioned arousal — producing faster sleep onset, fewer awakenings, and more consolidated sleep within a week or two.</p> <p><strong>How to implement:</strong></p> <ul> <li>Calculate your current average total sleep time (use a sleep diary for a week — not apps).</li> <li>Set a time-in-bed window equal to your average total sleep time plus 30 minutes. Minimum 5.5 hours regardless of reported sleep time.</li> <li>Fix a consistent wake time first — this is non-negotiable. Build the window backward from there.</li> <li>Stick to this window 7 days a week, including weekends, for at least two weeks.</li> <li>Once sleep efficiency exceeds 85–90% (time asleep divided by time in bed), extend the window by 15–30 minutes. Continue until you reach your desired amount of restorative sleep.</li> </ul> <p><strong>Expected experience:</strong> The first 3–5 days are typically harder. You will be sleepier. This is the treatment working — not failing. The sleepiness is sleep pressure building. Adherence in the first two weeks is what determines outcomes.</p> <p><strong>Contraindications:</strong> Discuss with your clinician before starting if you have bipolar disorder (sleep restriction can precipitate mania), a history of seizures, or an occupation where sleepiness creates safety risks (driving long distances, operating machinery). Sleep restriction should be supervised when contraindications may apply.</p> <p><strong>What it is not:</strong> Sleep restriction is not sleep deprivation. You are redirecting the sleep you are already capable of into a consolidated window, not eliminating it. The goal is efficiency, not exhaustion.</p>'},
    {id:'stimulus_control',title:'Stimulus control — retraining the bed-sleep association',body:'<p><strong>The problem it targets:</strong> After months or years of insomnia, the bedroom has become a conditioned cue for wakefulness, frustration, and anxiety. Lying in bed triggers the same arousal that makes it impossible to sleep — a Pavlovian association built through repeated pairing of "bed" with "awake and anxious." Stimulus control aims to break this association and rebuild bed as a reliable cue for sleep.</p> <p><strong>The rules of stimulus control:</strong></p> <ul> <li><strong>Only go to bed when sleepy</strong> (not just tired or at a designated bedtime). Sleepiness — heavy eyes, drooping head — not fatigue.</li> <li><strong>Get out of bed if you cannot sleep.</strong> If you have been awake for approximately 20 minutes (without clock-watching) and are not falling asleep, get up. Go to a different room. Do something quiet and non-stimulating until sleepy again, then return.</li> <li><strong>Use the bed only for sleep and sex.</strong> No reading, screens, working, eating, or worrying in bed. The bed must become reliably associated with sleep-relevant states only.</li> <li><strong>Maintain a consistent wake time</strong> regardless of how you slept. Do not compensate with lie-ins.</li> <li><strong>Avoid napping</strong> (or keep naps to under 20 minutes before 3pm if essential).</li> </ul> <p><strong>Why getting out of bed feels wrong but works:</strong> Staying in bed while unable to sleep reinforces the association between bed and wakefulness. Getting up breaks this pairing and, over time, restores the conditioned association between bed and sleep. Most people resist this initially — and most who implement it consistently notice improvement within 1–2 weeks.</p> <p><strong>What to do when out of bed:</strong> Keep lighting dim, avoid screens, keep temperature cool. Reading a physical book, gentle stretching, listening to calm audio, or quiet creative activities are appropriate. The goal is not stimulating engagement — it is reducing arousal while waiting for the sleep pressure to reassert itself.</p>'},
    {id:'cognitive_therapy_insomnia',title:'Cognitive therapy for insomnia — challenging unhelpful sleep beliefs',body:'<p><strong>Unhelpful beliefs about sleep maintain insomnia.</strong> Cognitive therapy for insomnia identifies and challenges specific thought patterns that increase arousal, perpetuate monitoring, and make it harder to disengage from wakefulness at night.</p> <p><strong>Common unhelpful sleep beliefs and the evidence against them:</strong></p> <ul> <li><strong>"I need 8 hours every night."</strong> Sleep need is highly individual, ranging from 6–9 hours in adults. The idea that 8 hours is universal comes from population averages, not biological requirements. Functioning on less than you "expect" does not mean you are sleep-deprived.</li> <li><strong>"I haven\'t slept at all."</strong> Almost universally inaccurate in chronic insomnia. See sleep state misperception. The subjective experience of wakefulness during light NREM sleep is real but does not mean no sleep occurred.</li> <li><strong>"Tomorrow will be ruined if I don\'t sleep well tonight."</strong> People consistently overestimate sleep\'s impact on next-day performance. Humans are remarkably resilient to one bad night. The anticipatory anxiety about a bad night creates more impairment than the poor sleep itself.</li> <li><strong>"I can\'t function without fixing my sleep first."</strong> This is an avoidance belief. Behavioural engagement (exercise, social contact, meaningful activity) improves both daytime function and sleep — not the other way around.</li> <li><strong>"Lying in bed resting is better than nothing."</strong> Lying in bed awake is not neutral. It actively reinforces conditioned arousal and reduces sleep pressure. It is not restorative.</li> </ul> <p><strong>Unhelpful safety behaviours:</strong></p> <ul> <li>Going to bed very early to "give sleep a chance" (increases time awake in bed)</li> <li>Cancelling commitments the day after a poor night (reinforces avoidance and the belief that function requires perfect sleep)</li> <li>Clock-watching (maintains monitoring and increases arousal)</li> <li>Excessive planning to manage fatigue (hypervigilance to sleep state)</li> </ul> <p><strong>The goal of cognitive therapy:</strong> Not positive thinking — but flexible, accurate thinking. Reducing the catastrophic interpretation of poor nights and the "performance pressure" that surrounds the sleep process.</p>'},
    {id:'medication_review',title:'Medications for insomnia — an honest review',body:'<p><strong>The core tension:</strong> Medications for insomnia work short-term. Most are not suitable for chronic insomnia — the condition most people actually present with. Understanding what each class does (and does not do) allows informed shared decision-making.</p> <table> <thead><tr><th>Class / Drug</th><th>Evidence / Role</th><th>Considerations</th></tr></thead> <tbody> <tr><td><strong>Z-drugs</strong><br>(zopiclone, zolpidem)</td><td>Good short-term efficacy for sleep onset and duration. Not superior to benzodiazepines despite marketing. Recommend 2–4 weeks maximum.</td><td>Tolerance, dependence, next-day sedation, impaired driving, rebound insomnia on stopping. Not effective long-term. Falls risk in older adults.</td></tr> <tr><td><strong>Benzodiazepines</strong><br>(temazepam, nitrazepam)</td><td>Effective short-term. Not recommended for chronic insomnia by any current guideline. Still widely prescribed.</td><td>Tolerance within days to weeks. Dependence. Withdrawal insomnia. Rebound worse than baseline. Significant harm in older adults.</td></tr> <tr><td><strong>Melatonin</strong><br>(Circadin, Slenyto)</td><td>Most useful for circadian disruption (delayed sleep phase, jet lag) and older adults (>55). Effect size for sleep-onset insomnia is modest at best. Does not address hyperarousal.</td><td>Safest available option. Low dependence risk. Timing matters — most effective 1–2h before desired sleep time. Prescription melatonin (Circadin) superior to OTC in most studies.</td></tr> <tr><td><strong>Orexin antagonists</strong><br>(suvorexant — Belsomra)</td><td>Novel mechanism — blocks wake-promoting orexin/hypocretin. Reduces wake time and improves sleep maintenance. Modest effect sizes but better safety profile than Z-drugs long-term.</td><td>Expensive. Some residual sleepiness. Contraindicated in narcolepsy. Growing evidence base. TGA-approved in Australia.</td></tr> <tr><td><strong>Sedating antihistamines</strong><br>(doxylamine, diphenhydramine)</td><td>Rapid tolerance (often within 3–5 days). No meaningful efficacy evidence for chronic insomnia despite widespread OTC availability.</td><td>Significant next-day sedation, anticholinergic side effects, falls risk. Not recommended by any sleep guideline.</td></tr> <tr><td><strong>Low-dose doxepin</strong><br>(Silenor 3–6mg)</td><td>The one tricyclic with strong evidence for insomnia specifically. Licensed in US, not in AU. Works on histamine H1 receptors at low doses. Good for sleep maintenance, not sedating the next day.</td><td>Not widely available in Australia but used off-label. Different mechanism and profile to antidepressant doses. Not suitable if anticholinergic burden is a concern.</td></tr> <tr><td><strong>Quetiapine (off-label)</strong><br>(Seroquel at 25–50mg)</td><td>Widely used off-label for insomnia. Minimal evidence for primary insomnia. Sedation due to H1 antagonism. NOT a first, second, or third-line insomnia treatment.</td><td>Metabolic effects, QTc prolongation, akathisia risk, extrapyramidal effects, and antipsychotic stigma — significant risks for a non-psychiatric indication. Should be used rarely and thoughtfully.</td></tr> <tr><td><strong>Mirtazapine</strong><br>(off-label)</td><td>Sedating antidepressant with H1 antagonism. Used in insomnia comorbid with depression or appetite suppression. No strong evidence for primary insomnia.</td><td>Weight gain, next-day sedation, constipation. Reasonable choice when depression and insomnia coexist.</td></tr> </tbody> </table> <p><strong>The evidence-based position:</strong> For chronic primary insomnia, CBT-I outperforms all medications in long-term outcomes. Medication may have a role in short-term management, during CBT-I initiation, or in specific populations (hospitalised patients, acute situational insomnia). Chronic medication should prompt a shared decision-making conversation about whether long-term use aligns with goals.</p>'}
  ]},
  {label:'Practical Strategies',optional:true,items:[
    {id:'fixed_wake_time',title:'The fixed wake time — the single most important anchor',body:'<p><strong>If you do only one thing:</strong> Set a fixed wake time and protect it 7 days a week. This is the most reliably evidence-backed behavioural change for insomnia that does not involve the discomfort of sleep restriction. It anchors Process C (your circadian clock) and creates the conditions under which sleep pressure can build reliably.</p> <p><strong>Why it matters more than bedtime:</strong> Bedtime is determined by sleepiness — which fluctuates based on sleep pressure and arousal. Wake time determines when the adenosine clock resets. Consistent wake time → consistent sleep pressure build-up → more reliable sleepiness at an appropriate bedtime over days to weeks.</p> <p><strong>Practical implementation:</strong></p> <ul> <li>Choose a wake time you can maintain on weekends as well as weekdays — within 30 minutes is the target.</li> <li>On mornings after poor nights, the pull to stay in bed is strong. This is exactly when getting up matters most — sleep pressure accumulates from the moment you get up, not from when you "should" have woken.</li> <li>Get bright light within 30 minutes of waking. Morning light is the most potent circadian anchor available. Outside is best; a light therapy lamp (10,000 lux, 20–30 minutes) is effective when outdoor light is unavailable.</li> </ul> <p><strong>What to do if you had no sleep or near-no sleep:</strong> Still get up at the fixed wake time. The temptation to compensate is understandable and counterproductive. One extra hour in bed reduces sleep pressure by roughly one hour — making the next night harder. The fixed wake time should be non-negotiable during active CBT-I.</p> <p><strong>Social jetlag:</strong> The chronic mismatch between weekday and weekend sleep timing experienced by most people who "catch up on sleep" on weekends. Social jetlag impairs circadian regulation in a manner similar to shift work and is a significant perpetuating factor for insomnia. Consistency across all 7 days is not optional.</p>'},
    {id:'busy_mind_at_night',title:'Managing a busy mind at night — what actually works',body:'<p><strong>The standard advice that does not work:</strong> "Clear your mind." "Stop thinking." "Relax." These instructions are not only unhelpful — they increase arousal by adding a performance task ("I must not think") to bedtime, which is the opposite of what is needed.</p> <p><strong>Constructive worry time:</strong> Schedule 15–20 minutes earlier in the evening (not within 2 hours of bed) specifically for cognitive engagement with worries. Write down concerns and, where possible, brief action plans. The goal is to "offload" from working memory so the brain does not treat bedtime as its first opportunity to process unresolved material. This is evidence-based and underused.</p> <p><strong>Cognitive shuffle (a novel evidence-informed approach):</strong> Deliberately generate a sequence of unrelated, mildly absurd imagery — a spoon, a lighthouse, a purple elephant on roller skates. This disrupts coherent verbal thought (the "busy mind") and mimics the hypnagogic (pre-sleep) imagery pattern. It gives the mind something to "do" that does not maintain arousal in the way that problem-solving or rumination does.</p> <p><strong>Paradoxical intention:</strong> Lie in the dark with eyes open and try to stay awake — passively, without straining. This removes the performance pressure of "trying to sleep" and paradoxically reduces arousal. Evidence supports its effectiveness particularly for sleep-onset insomnia.</p> <p><strong>Acceptance rather than suppression:</strong> "I am awake. This is uncomfortable. I can tolerate being awake." Accepting wakefulness — not welcoming it, but not fighting it — reduces arousal more effectively than any cognitive attempt to force sleep. Defusion from distressing thoughts about wakefulness ("this is terrible, I\'ll be destroyed tomorrow") has more impact than suppression.</p> <p><strong>What about reading, podcasts, and white noise?</strong> Low-stimulation audio (slow-paced podcasts, ambient sound) can reduce cognitive arousal if they distract from rumination without being engaging enough to delay sleep. For some people they help; for others they maintain arousal through attentional engagement. Trial and observe your own response.</p>'},
    {id:'alcohol_caffeine_cannabis',title:'What alcohol, caffeine, and cannabis actually do to sleep',body:'<p><strong>Alcohol — the most misunderstood sleep substance:</strong></p> <ul> <li>Alcohol accelerates sleep onset — this is real, and why so many people use it as a sleep aid.</li> <li>It simultaneously suppresses REM sleep and disrupts sleep architecture in the second half of the night. As alcohol is metabolised (typically 3–5 hours after drinking), rebound arousal causes fragmented, lighter sleep.</li> <li>Regular alcohol use before bed produces tolerance to the sleep-onset effect within days to weeks, while the sleep-disrupting rebound effect persists.</li> <li>Alcohol worsens sleep apnoea by relaxing upper airway musculature.</li> <li>The next-day "alcohol sleep" effect — feeling unrested despite long sleep — reflects the suppression of restorative slow-wave and REM sleep.</li> <li>A single drink\'s effect on sleep architecture is detectable via PSG. There is no "small amount" that is neutral.</li> </ul> <p><strong>Caffeine — the duration is what catches people:</strong></p> <ul> <li>Caffeine\'s half-life in most adults is 5–7 hours. A 200mg cup of coffee at 3pm leaves 100mg active at 8–10pm.</li> <li>Individual variation is large — genetic differences in CYP1A2 enzyme activity produce slow metabolisers who are significantly more sensitive than fast metabolisers.</li> <li>Caffeine blocks adenosine receptors — it does not remove adenosine. When it clears, the accumulated adenosine binds suddenly (the "afternoon crash").</li> <li>The practical cutoff for most people with insomnia: no caffeine after 12–1pm. For slow metabolisers, earlier.</li> <li>Don\'t forget: tea (especially black tea), cola drinks, energy drinks, pre-workout supplements, and some medications contain meaningful caffeine.</li> </ul> <p><strong>Cannabis — a more complicated picture:</strong></p> <ul> <li>THC reduces sleep onset and suppresses REM sleep. Short-term, it can appear to improve sleep by reducing the time to sleep and increasing slow-wave sleep.</li> <li>Tolerance to both effects develops rapidly. Within weeks, users often sleep no better than before use began — but now have a dependency.</li> <li>Cannabis withdrawal prominently features insomnia, vivid dreams, and sleep disruption — which drives many people to re-use, creating a maintenance cycle.</li> <li>CBD has minimal evidence as a standalone sleep aid. Most commercial CBD products are underdosed for any potential effect.</li> <li>Cannabis use complicates insomnia treatment and is worth raising honestly in clinical discussion.</li> </ul>'},
    {id:'napping_nuances',title:'Napping — when it helps and when it does not',body:'<p><strong>The default CBT-I position:</strong> Avoid napping during active sleep restriction. Napping reduces adenosine build-up and lowers sleep pressure at the target bedtime, undermining the primary mechanism of sleep restriction.</p> <p><strong>When napping is appropriate:</strong></p> <ul> <li>Occupational safety: if you must drive or operate machinery and are severely sleep-deprived, a brief nap is a safety necessity, not a behavioural failure.</li> <li>After the consolidation phase of CBT-I: once sleep is stable and efficient, a brief strategic nap has less impact.</li> <li>Older adults: napping has different characteristics in older adults and the evidence for strict nap restriction in this group is weaker.</li> </ul> <p><strong>The optimal nap (if napping is unavoidable):</strong></p> <ul> <li>Duration: 10–20 minutes. This captures the benefits of stage 1–2 NREM (reduced fatigue, improved alertness) without entering slow-wave sleep — which causes "sleep inertia" (post-nap grogginess) and the deepest disruption of nighttime sleep pressure.</li> <li>Timing: before 3pm. Later naps directly impair Process C alignment with the nighttime sleep window.</li> <li>The coffee nap: drinking a coffee immediately before a 20-minute nap produces better post-nap alertness than either coffee or nap alone. Caffeine takes approximately 20 minutes to absorb — you wake at peak effect. Useful for acute performance demands.</li> </ul> <p><strong>Delaying sleep phase vs insomnia:</strong> Some people who report insomnia actually have delayed sleep phase syndrome — a circadian clock disorder where the sleep window is simply shifted later (e.g. naturally falling asleep at 2am and waking at 10am, sleeping well within that window). This is biologically distinct from insomnia and requires different treatment (chronotherapy, timed bright light, melatonin in specific timing protocols). The distinction is clinically important and worth discussing if your difficulty is specifically sleep-onset at a conventional time while overall sleep quality is good.</p>'}
  ]},
  {label:'Products and Resources',optional:true,items:[
    {id:'insomnia_books',title:'Recommended books',body:'<p><strong>Say Good Night to Insomnia</strong> — Gregg Jacobs. Written by one of the original CBT-I researchers. Structured 6-week programme. Evidence-based, practical, and one of the best self-help books available for someone wanting to implement CBT-I independently without a therapist.</p> <p><strong>The Sleep Solution</strong> — W. Chris Winter. Arguably the most readable and entertaining book on sleep science written for a lay audience. Winter is a neurologist and sleep specialist. Explains the two-process model, circadian biology, and CBT-I in plain language. Particularly good at dismantling the myths and anxieties people have built up around sleep.</p> <p><strong>Why We Sleep</strong> — Matthew Walker. The most widely read popular sleep book. Excellent on the importance of sleep and the science of sleep stages. <em>Note:</em> Several specific claims have been criticised by sleep researchers for overstating evidence — read critically. Still worth reading for the breadth of sleep science, with awareness of this caveat.</p> <p><strong>Overcoming Insomnia</strong> — Jack Edinger &amp; Colleen Carney. Therapist-guide companion also available as a workbook. More clinical in tone than Jacobs or Winter. Best suited to those who want structured worksheets and a therapy-mirroring format.</p> <p><strong>The Effortless Sleep Method</strong> — Sasha Stephens. Written by someone with lived experience of severe insomnia. More acceptance-focused, less technical. Useful for those who have tried behavioural approaches and found them too mechanistic — reframes the relationship with sleep from a different angle.</p>'},
    {id:'insomnia_apps_resources',title:'Apps, digital programmes, and resources',body:'<p><strong>Sleepio</strong> — Digital CBT-I programme with the strongest evidence base of any sleep app. Developed by Oxford researchers, multiple randomised controlled trials demonstrating efficacy comparable to face-to-face CBT-I. 6-week interactive programme with animated sessions, sleep diary, and personalised weekly programme. Available via Big Health. <a href="https://www.sleepio.com" target="_blank">sleepio.com</a></p> <p><strong>Somryst</strong> — FDA-cleared prescription digital therapeutic for chronic insomnia in the US. Delivers CBT-I components with clinical-grade evidence. Not available as a prescription digital therapeutic in Australia, but accessible as a self-pay app. Rigorous content. <a href="https://www.somryst.com" target="_blank">somryst.com</a></p> <p><strong>Insomnia Coach</strong> — Free app developed by the US Department of Veterans Affairs. Delivers a structured CBT-I programme based on treatment developed at Stanford. Sleep diary, weekly sleep data, psychoeducation, and guidance. No paywall. <a href="https://mobile.va.gov/app/insomnia-coach" target="_blank">mobile.va.gov/app/insomnia-coach</a></p> <p><strong>Sleep Foundation</strong> — Research-reviewed sleep information resource. Good for checking evidence on specific sleep topics without the commercial bias of many sleep websites. <a href="https://www.sleepfoundation.org" target="_blank">sleepfoundation.org</a></p> <p><strong>Sleep Health Foundation (Australia)</strong> — Australian sleep medicine organisation with patient information resources, fact sheets, and clinician directory. <a href="https://www.sleephealthfoundation.org.au" target="_blank">sleephealthfoundation.org.au</a></p> <p><strong>Headspace / Calm</strong> — Both offer sleep-specific content (sleep meditations, sleepcasts, body scans). Not CBT-I and not evidence-based for insomnia disorder specifically — but can be useful adjuncts for reducing somatic arousal in people who find mindfulness or meditation helpful. Not a substitute for CBT-I.</p>'}
  ]}
]

var showADHD=false, showASD=false, showOCD=false, showIns=false;
var adhdSel={}, asdSel={}, ocdSel={}, insSel={};

var CONDITIONS={
  adhd:{groups:ADHD_PE_GROUPS,sel:adhdSel,done:'adhd-done',listId:'adhd-topic-list',blockId:'block-adhd',btnId:'dis-adhd',cls:'active-adhd'},
  asd: {groups:ASD_PE_GROUPS, sel:asdSel, done:'asd-done', listId:'asd-topic-list', blockId:'block-asd', btnId:'dis-asd', cls:'active-asd'},
  ocd: {groups:OCD_PE_GROUPS, sel:ocdSel, done:'ocd-done', listId:'ocd-topic-list', blockId:'block-ocd', btnId:'dis-ocd', cls:'active-ocd'},
  ins: {groups:INSOMNIA_PE_GROUPS,sel:insSel,done:'ins-done',listId:'ins-topic-list',blockId:'block-ins',btnId:'dis-ins',cls:'active-ins'}
};

var SHOW={adhd:false,asd:false,ocd:false,ins:false};

function $(id){return document.getElementById(id);}
function f(id){var el=$(id);return el?el.value.trim():'';}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleCondition(cond){
  SHOW[cond]=!SHOW[cond];
  var c=CONDITIONS[cond];
  $(c.btnId).className='dis-btn'+(SHOW[cond]?' '+c.cls:'');
  $(c.blockId).style.display=SHOW[cond]?'':'none';
  refresh();
}

function renderTopics(){
  Object.keys(CONDITIONS).forEach(function(cond){
    var c=CONDITIONS[cond];
    renderTopicList(c.listId, c.groups, c.sel, cond, c.done);
  });
}

function renderTopicList(containerId, groups, sel, condKey, doneClass){
  var el=$(containerId); if(!el) return;
  var html='';
  groups.forEach(function(g){
    if(g.label) html+='<div class="pe-group-label">'+(g.optional?'<span style="font-size:9px;opacity:.6;font-weight:600;margin-right:4px">OPTIONAL</span>':'')+esc(g.label)+'</div>';
    g.items.forEach(function(item){
      var done=!!sel[item.id];
      html+='<div class="pe-section'+(done?' '+doneClass:'')+(g.optional?' pe-optional':'')+'" data-id="'+item.id+'" data-cond="'+condKey+'">';
      html+='<div class="pe-header">';
      html+='<span class="pe-tick-btn">'+(done?'&#9745;':'&#9744;')+'</span>';
      html+='<span class="pe-title">'+esc(item.title)+'</span>';
      html+='<span class="pe-arrow">&#9658;</span>';
      html+='</div>';
      html+='<div class="pe-body">'+item.body+'</div>';
      html+='</div>';
    });
  });
  el.innerHTML=html;
  el.addEventListener('click',function(e){
    var sec=e.target.closest('[data-id]'); if(!sec) return;
    var id=sec.getAttribute('data-id'), cn=sec.getAttribute('data-cond');
    var isTick=e.target.classList.contains('pe-tick-btn');
    if(isTick){
      e.stopPropagation();
      var c=CONDITIONS[cn];
      c.sel[id]=!c.sel[id];
      sec.classList.toggle(c.done,!!c.sel[id]);
      sec.querySelector('.pe-tick-btn').innerHTML=c.sel[id]?'&#9745;':'&#9744;';
      refresh();
    } else {
      var hdr=e.target.closest('.pe-header'); if(hdr) sec.classList.toggle('pe-open');
    }
  });
}

function selectAll(cond){
  var c=CONDITIONS[cond];
  c.groups.forEach(function(g){g.items.forEach(function(item){c.sel[item.id]=true;});});
  renderTopics(); refresh();
}
function clearAll(cond){
  var c=CONDITIONS[cond];
  Object.keys(c.sel).forEach(function(k){c.sel[k]=false;});
  renderTopics(); refresh();
}

var ADHD_GROUP_COLORS={'null':'adhd-g-general','Medication Information':'adhd-g-med','Non-pharmacological Strategies':'adhd-g-nonpharm','Products and Resources':'adhd-g-products'};
var ASD_GROUP_COLORS={'null':'asd-g','Products and Resources':'asd-g','Additional Topics':'asd-g'};
var OCD_GROUP_COLORS={'null':'ocd-g-core','Treatment':'ocd-g-treatment','Strategies and Self-Help':'ocd-g-strategies','Products and Resources':'ocd-g-resources'};
var INS_GROUP_COLORS={'null':'ins-g-core','Treatment':'ins-g-treatment','Practical Strategies':'ins-g-strategies','Products and Resources':'ins-g-resources'};

var CONDITION_META={
  adhd:{titleCls:'adhd-t',label:'Attention Deficit Hyperactivity Disorder (ADHD)',groupColors:ADHD_GROUP_COLORS,defaultGroupCls:'adhd-g-general'},
  asd: {titleCls:'asd-t', label:'Autism Spectrum Disorder (ASD)', groupColors:ASD_GROUP_COLORS, defaultGroupCls:'asd-g'},
  ocd: {titleCls:'ocd-t', label:'Obsessive-Compulsive Disorder (OCD)', groupColors:OCD_GROUP_COLORS, defaultGroupCls:'ocd-g-core'},
  ins: {titleCls:'ins-t', label:'Insomnia', groupColors:INS_GROUP_COLORS, defaultGroupCls:'ins-g-core'}
};

function buildHandout(){
  var name=f('ptName')||'Patient';
  var dr=f('drName')||'Your clinician';
  var dv=f('ptDate'),ds=dv?new Date(dv+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):'';

  var hasAny=false;
  ['adhd','asd','ocd','ins'].forEach(function(cond){
    if(!SHOW[cond]) return;
    var c=CONDITIONS[cond];
    c.groups.forEach(function(g){g.items.forEach(function(item){if(c.sel[item.id])hasAny=true;});});
  });
  if(!hasAny) return null;

  var h='';
  h+='<div class="ho-header">';
  h+='<div class="ho-pt">Psychoeducation Handout</div>';
  h+='<div class="ho-meta">Patient: <strong>'+esc(name)+'</strong>';
  if(ds) h+=' &nbsp;|&nbsp; '+esc(ds);
  h+=' &nbsp;|&nbsp; Clinician: <strong>'+esc(dr)+'</strong></div>';
  h+='<div class="ho-notice">The following information was discussed or provided as educational material during your appointment. It is a reference guide only — all treatment decisions should be made in consultation with your treating clinician.</div>';
  h+='</div>';

  ['adhd','asd','ocd','ins'].forEach(function(cond){
    if(!SHOW[cond]) return;
    var c=CONDITIONS[cond];
    var meta=CONDITION_META[cond];
    var selItems=getSelectedItems(c.groups,c.sel);
    if(!selItems.length) return;
    h+='<div class="ho-condition-title '+meta.titleCls+'">'+meta.label+'</div>';
    h+=buildConditionContent(selItems,c.groups,meta.groupColors,meta.defaultGroupCls);
  });

  h+='<div class="ho-footer">This handout was prepared specifically for '+esc(name)+(ds?' following a psychiatric appointment on '+esc(ds):'')+'. It is not a substitute for clinical advice.</div>';
  return h;
}

function getSelectedItems(groups,sel){
  var result=[];
  groups.forEach(function(g){
    g.items.forEach(function(item){
      if(sel[item.id]) result.push({group:g.label,item:item});
    });
  });
  return result;
}

function buildConditionContent(selectedItems,groups,groupColors,defaultCls){
  var groupMap={},groupOrder=[];
  groups.forEach(function(g){
    var gKey=g.label||'null';
    g.items.forEach(function(item){
      var found=selectedItems.find(function(s){return s.item.id===item.id;});
      if(found){
        if(!groupMap[gKey]){groupMap[gKey]=[];groupOrder.push({key:gKey,label:g.label});}
        groupMap[gKey].push(item);
      }
    });
  });
  var h='';
  groupOrder.forEach(function(gInfo){
    var gKey=gInfo.key, gLabel=gInfo.label;
    if(gLabel){
      var cls=groupColors[gLabel]||defaultCls;
      h+='<div class="ho-group-label '+cls+'">'+esc(gLabel)+'</div>';
    }
    groupMap[gKey].forEach(function(item){
      h+='<div class="ho-topic">';
      h+='<div class="ho-topic-title">'+esc(item.title)+'</div>';
      h+='<div class="ho-topic-body">'+item.body+'</div>';
      h+='</div>';
    });
  });
  return h;
}

function refresh(){
  var html=buildHandout();
  var pv=$('preview');
  if(!html){pv.innerHTML='<div class="empty-msg">Select a condition and tick topics above to generate the handout.</div>';return;}
  pv.innerHTML=html;
}

function dlDocx(){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected — please tick some topics first.');return;}
  var name=(f('ptName')||'Patient').replace(/[^a-zA-Z0-9]/g,'_');
  var blob=new Blob(['﻿'+docx],{type:'application/msword;charset=utf-8'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='Psychoeducation_Handout_'+name+'.doc';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  flash($('btn-docx'),'Downloaded!');
}
function copyPlain(btn){
  var pv=$('preview');
  if(!buildHandout()){alert('No topics selected — please tick some topics first.');return;}
  navigator.clipboard.writeText(pv.innerText||pv.textContent).then(function(){flash(btn,'Copied!');}).catch(function(){});
}
function copyFormatted(btn){
  var docx=buildDocxHtml(); if(!docx){alert('No topics selected — please tick some topics first.');return;}
  if(window.ClipboardItem){
    var blob=new Blob([docx],{type:'text/html'});
    navigator.clipboard.write([new ClipboardItem({'text/html':blob})]).then(function(){flash(btn,'Copied!');}).catch(function(){
      navigator.clipboard.writeText($('preview').innerText||'').then(function(){flash(btn,'Copied (plain)!');});
    });
  } else {
    navigator.clipboard.writeText($('preview').innerText||'').then(function(){flash(btn,'Copied!');});
  }
}
function flash(btn,msg){
  if(!btn)return;
  var orig=btn.textContent;btn.textContent=msg;btn.classList.add('copied');
  setTimeout(function(){btn.textContent=orig;btn.classList.remove('copied');},2000);
}

document.addEventListener('DOMContentLoaded',function(){
  var td=new Date().toISOString().slice(0,10);
  var dtEl=$('ptDate'); if(dtEl&&!dtEl.value) dtEl.value=td;
  renderTopics();
  toggleCondition('adhd');
  refresh();
});
</script>
